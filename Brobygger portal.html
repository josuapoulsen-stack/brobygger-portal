<script type="text/babel">
// Admin matching flow + onboarding wizard

// ═══════════════════════════════════════════════════════════
// MATCHING FLOW — rådgiver/admin matches menneske with brobygger
// ═══════════════════════════════════════════════════════════
// ── StedSoeg ────────────────────────────────────────────────────────────────
// Structured location picker: søg på by eller sygehus → vælg afsnit
const StedSoeg = ({ value, onChange, viewingHq }) => {
  const [query, setQuery] = React.useState('');
  const [open,  setOpen]  = React.useState(false);
  const ref = React.useRef(null);

  // Close on outside click
  React.useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const TYPE_META = {
    'sygehus-afsnit': { label: 'Sygehus', color: SoS.sky,    bg: SoS.skySoft    },
    'laegepraksis':   { label: 'Læge',    color: SoS.sage,   bg: SoS.sageSoft   },
    'andet':          { label: 'Andet',   color: SoS.inkMuted, bg: SoS.creamDeep },
  };

  const q = query.toLowerCase().trim();
  const localKommuner = viewingHq && window.SoS_HQ_KOMMUNER ? (window.SoS_HQ_KOMMUNER[viewingHq] || []) : [];
  const isLocal = s => localKommuner.length > 0 && localKommuner.some(k => (s.by || '').includes(k));
  const matched = q.length < 1 ? [] : SoS_STEDER.filter(s => {
    const haystack = [s.navn, s.sygehus || '', s.by || ''].join(' ').toLowerCase();
    return q.split(' ').every(word => haystack.includes(word));
  });
  const filtered = [...matched.filter(isLocal), ...matched.filter(s => !isLocal(s))].slice(0, 18);
  const hasLocalAndOther = filtered.some(isLocal) && filtered.some(s => !isLocal(s));

  // Group by sygehus; sæt divider efter lokale resultater
  const groups = [];
  const seenSygehus = {};
  let dividerInserted = false;
  filtered.forEach(s => {
    const loc = isLocal(s);
    if (!loc && !dividerInserted && hasLocalAndOther) {
      groups.push({ _divider: true });
      dividerInserted = true;
    }
    if (s.type === 'sygehus-afsnit') {
      const key = s.sygehus + '|' + s.by;
      if (!seenSygehus[key]) { seenSygehus[key] = { label: s.sygehus, by: s.by, local: loc, items: [] }; groups.push(seenSygehus[key]); }
      seenSygehus[key].items.push(s);
    } else {
      groups.push({ label: null, by: null, local: loc, items: [s] });
    }
  });

  const handleSelect = (s) => { onChange(s); setQuery(''); setOpen(false); };
  const handleClear  = () => { onChange(null); setQuery(''); };

  if (value) return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10,
      padding: '12px 14px', background: '#fff',
      border: `1.5px solid ${SoS.orange}`, borderRadius: SoS.r.md }}>
      <div style={{ flex: 1 }}>
        <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink }}>
          {value.navn}
        </div>
        {value.sygehus && (
          <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, marginTop: 2 }}>
            {value.sygehus} · {value.by}
          </div>
        )}
        {!value.sygehus && value.by && (
          <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, marginTop: 2 }}>
            {value.by}
          </div>
        )}
      </div>
      <Pill bg={TYPE_META[value.type]?.bg} color={TYPE_META[value.type]?.color}>
        {TYPE_META[value.type]?.label}
      </Pill>
      <button onClick={handleClear} style={{ background: 'none', border: 'none',
        cursor: 'pointer', color: SoS.inkMuted, fontSize: 18, lineHeight: 1, padding: 2,
        display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        ×
      </button>
    </div>
  );

  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '12px 14px',
        background: '#fff', border: `1.5px solid ${open ? SoS.orange : SoS.lineSoft}`,
        borderRadius: SoS.r.md, transition: 'border-color 0.15s' }}>
        <Icon name="search" size={14} color={SoS.inkMuted}/>
        <input
          autoComplete="off"
          placeholder="Søg by eller sygehus\u2026"
          value={query}
          onFocus={() => setOpen(true)}
          onChange={e => { setQuery(e.target.value); setOpen(true); }}
          style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent',
            fontFamily: SoS.sans, fontSize: 14, color: SoS.ink }}
        />
        {query && (
          <button onClick={() => setQuery('')} style={{ background: 'none', border: 'none',
            cursor: 'pointer', color: SoS.inkMuted, fontSize: 16, lineHeight: 1, padding: 0 }}>
            ×
          </button>
        )}
      </div>

      {open && query.length >= 1 && (
        <div style={{ position: 'absolute', top: 'calc(100% + 6px)', left: 0, right: 0,
          background: '#fff', borderRadius: SoS.r.lg,
          boxShadow: '0 8px 32px rgba(0,0,0,0.14)', border: `1px solid ${SoS.lineSoft}`,
          zIndex: 999, maxHeight: 340, overflowY: 'auto' }}>

          {groups.length === 0 ? (
            <div style={{ padding: 16, fontFamily: SoS.sans, fontSize: 13,
              color: SoS.inkMuted, textAlign: 'center' }}>
              Ingen resultater — prøv en anden søgning
            </div>
          ) : groups.map((g, gi) => (
            <div key={gi}>
              {/* Divider: lokale → øvrige */}
              {g._divider && (
                <div style={{ padding: '6px 14px', fontFamily: SoS.sans, fontSize: 10,
                  fontWeight: 700, color: SoS.inkMuted, letterSpacing: 0.8,
                  textTransform: 'uppercase', borderTop: `1px solid ${SoS.lineSoft}`,
                  background: SoS.creamDeep }}>
                  Øvrige steder
                </div>
              )}
              {/* Sygehus group header */}
              {!g._divider && g.label && (
                <div style={{ padding: '10px 14px 4px',
                  fontFamily: SoS.sans, fontSize: 10, fontWeight: 700,
                  color: SoS.inkMuted, letterSpacing: 0.8, textTransform: 'uppercase',
                  borderTop: gi > 0 ? `1px solid ${SoS.lineSoft}` : 'none',
                  display: 'flex', alignItems: 'center', gap: 6 }}>
                  {g.label} · {g.by}
                  {g.local && <span style={{ background: SoS.sage + '25', color: SoS.sage,
                    borderRadius: 4, padding: '1px 5px', fontSize: 9, fontWeight: 700,
                    letterSpacing: 0.4 }}>LOKAL</span>}
                </div>
              )}
              {g.items.map(s => {
                const meta = TYPE_META[s.type] || TYPE_META.andet;
                return (
                  <button key={s.id}
                    onMouseDown={e => { e.preventDefault(); handleSelect(s); }}
                    style={{ display: 'flex', alignItems: 'center', gap: 12,
                      width: '100%', padding: '10px 14px', textAlign: 'left',
                      background: 'none', border: 'none', cursor: 'pointer' }}
                    onMouseEnter={e => e.currentTarget.style.background = SoS.cream}
                    onMouseLeave={e => e.currentTarget.style.background = 'none'}>
                    <div style={{ width: 8, height: 8, borderRadius: 4,
                      background: meta.color, flexShrink: 0 }}/>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: SoS.sans, fontSize: 13,
                        fontWeight: s.type === 'laegepraksis' ? 500 : 600, color: SoS.ink }}>
                        {s.navn}
                        {s.type === 'laegepraksis' && s.by &&
                          <span style={{ fontWeight: 400, color: SoS.inkSoft }}>, {s.by}</span>}
                      </div>
                    </div>
                    {g.local && <span style={{ background: SoS.sage + '25', color: SoS.sage,
                      borderRadius: 4, padding: '2px 6px', fontFamily: SoS.sans, fontSize: 10,
                      fontWeight: 700, letterSpacing: 0.3, flexShrink: 0 }}>Lokal</span>}
                    <Pill bg={meta.bg} color={meta.color} style={{ flexShrink: 0 }}>
                      {meta.label}
                    </Pill>
                  </button>
                );
              })}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};
window.StedSoeg = StedSoeg;

const MatchingStepBrobygger = ({ menneske, brobyggerId, setBrobyggerId }) => {
  const DURATIONS_MAP = {30:'30 min',60:'1 time',90:'1½ time',120:'2 timer'};
  const available = SoS_BROBYGGERE
    .filter(b => b.status === 'aktiv' || b.status === 'ny')
    .slice()
    .sort((a, b) => b.openShifts - a.openShifts);
  const prevBb = menneske.previousBrobygger
    ? SoS_BROBYGGERE.find(b => b.id === menneske.previousBrobygger)
    : null;

  // Find sidst fælles aftale
  const allAppts = [...(window.SoS_APPOINTMENTS_BUSY || []), ...(window.SoS_HISTORIK || [])];
  const lastAppt = prevBb
    ? allAppts
        .filter(a => a.menneskeId === menneske.id && a.brobyggerId === prevBb.id)
        .sort((a, b) => b.date.localeCompare(a.date))[0]
    : null;

  React.useEffect(() => {
    if (prevBb && !brobyggerId) setBrobyggerId(prevBb.id);
  }, [menneske.id]);

  const others = available.filter(b => !prevBb || b.id !== prevBb.id);

  const BrobyggerCard = ({ b, isPrev }) => {
    const sel = brobyggerId === b.id;
    const hasShift = b.openShifts > 0;
    return (
      <button onClick={() => setBrobyggerId(b.id)} style={{
        display: 'flex', gap: 12, alignItems: 'center', width: '100%',
        padding: 14, marginBottom: isPrev ? 16 : 8, textAlign: 'left',
        background: isPrev ? '#FFFBF5' : '#fff',
        border: `2px solid ${sel ? SoS.orange : isPrev ? '#E8A84B' : SoS.lineSoft}`,
        borderRadius: SoS.r.md, cursor: 'pointer',
        boxShadow: sel ? SoS.shadow.md : isPrev ? '0 2px 10px rgba(232,168,75,0.15)' : 'none',
        opacity: !hasShift && !sel && !isPrev ? 0.55 : 1,
        position: 'relative', overflow: 'hidden',
      }}>
        {/* Gylden venstre-kant på forrige brobygger */}
        {isPrev && (
          <div style={{
            position: 'absolute', left: 0, top: 0, bottom: 0,
            width: 4, background: 'linear-gradient(180deg, #E8C14B, #E8904B)',
          }}/>
        )}
        <div style={{ paddingLeft: isPrev ? 4 : 0, display: 'flex', gap: 12,
          alignItems: 'center', flex: 1, minWidth: 0 }}>
          {/* Avatar med stjerne-overlay for forrige */}
          <div style={{ position: 'relative', flexShrink: 0 }}>
            <Avatar initials={b.avatar} bg={b.bg} size={44}/>
            {isPrev && (
              <div style={{
                position: 'absolute', bottom: -3, right: -3,
                width: 18, height: 18, borderRadius: 9,
                background: '#E8C14B', border: '2px solid #FFFBF5',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <Icon name="star" size={9} color="#fff" weight={2.5}/>
              </div>
            )}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
              <span style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink }}>
                {b.name}
              </span>
              {hasShift ? (
                <span style={{ fontFamily: SoS.sans, fontSize: 10, fontWeight: 700,
                  color: SoS.sage, background: SoS.sageSoft, padding: '2px 7px', borderRadius: 999 }}>
                  {b.openShifts} ledige vagter
                </span>
              ) : (
                <span style={{ fontFamily: SoS.sans, fontSize: 10,
                  color: SoS.inkMuted, background: SoS.lineSoft + '88',
                  padding: '2px 7px', borderRadius: 999 }}>
                  Ingen vagter
                </span>
              )}
            </div>
            {isPrev ? (
              <div style={{ fontFamily: SoS.sans, fontSize: 11, color: '#B87A20', fontWeight: 500 }}>
                {lastAppt
                  ? `Sidst tilknyttet ${new Date(lastAppt.date).toLocaleDateString('da-DK', { day: 'numeric', month: 'long' })}`
                  : 'Tidl. tilknyttet brobygger — personen ønsker dem igen'}
              </div>
            ) : (
              <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>
                {b.active} aktive forløb · {b.thisMonth} aftaler denne måned
              </div>
            )}
          </div>
          {sel ? (
            <div style={{ width: 24, height: 24, borderRadius: 12,
              background: SoS.orange, display: 'flex',
              alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Icon name="check" size={14} color="#fff" weight={2.5}/>
            </div>
          ) : isPrev ? (
            <div style={{ flexShrink: 0, opacity: 0.5 }}>
              <Icon name="chevron" size={16} color={SoS.inkMuted}/>
            </div>
          ) : null}
        </div>
      </button>
    );
  };

  return (
    <>
      <div style={{ fontFamily: SoS.font, fontSize: 24, fontWeight: 500,
        color: SoS.ink, marginBottom: 4, letterSpacing: -0.2 }}>Vælg brobygger</div>
      {menneske.brobygning ? (
        <div style={{ background: SoS.orange + '0F', border: '1px solid ' + SoS.orange + '30',
          borderRadius: SoS.r.md, padding: '10px 14px', marginBottom: 16,
          display: 'flex', flexWrap: 'wrap', gap: '4px 16px' }}>
          <span style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.orangeDeep, fontWeight: 700 }}>
            {new Date(menneske.brobygning.dato).toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' })}
            {' kl. '}{menneske.brobygning.start}
          </span>
          {menneske.brobygning.frekvens && (
            <span style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.orangeDeep }}>
              {'· '}{menneske.brobygning.frekvens}
            </span>
          )}
          {menneske.brobygning.duration && (
            <span style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.orangeDeep }}>
              {'· '}{DURATIONS_MAP[menneske.brobygning.duration] || ''}
            </span>
          )}
        </div>
      ) : (
        <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
          marginBottom: 16, lineHeight: 1.5 }}>
          Sorteret efter ledige vagter.
        </div>
      )}

      {/* Forrige brobygger — fremhævet sektion */}
      {prevBb && (
        <>
          <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 8 }}>
            <Icon name="star" size={13} color="#E8C14B" weight={2}/>
            <span style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
              color: '#B87A20', letterSpacing: 0.5, textTransform: 'uppercase' }}>
              Ønsket brobygger fra tidligere
            </span>
          </div>
          <BrobyggerCard b={prevBb} isPrev={true}/>
        </>
      )}

      {/* Øvrige brobyggere */}
      {others.length > 0 && (
        <>
          {prevBb && (
            <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
              color: SoS.inkMuted, letterSpacing: 0.5, textTransform: 'uppercase',
              marginBottom: 8 }}>
              Øvrige brobyggere
            </div>
          )}
          {others.map(b => <BrobyggerCard key={b.id} b={b} isPrev={false}/>)}
        </>
      )}
    </>
  );
};

const MatchingFlow = ({ onClose }) => {
  const [step, setStep] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [menneskeId, setMenneskeId] = React.useState(null);
  const [brobyggerId, setBrobyggerId] = React.useState(null);

  // Step 1 state
  const [aftaleDato, setAftaleDato] = React.useState('2026-05-05');
  const [aftaleStart, setAftaleStart] = React.useState(null);
  const [aftaleDuration, setAftaleDuration] = React.useState(null);
  const [aftaleType, setAftaleType] = React.useState(null);
  const [aftaleSted, setAftaleSted] = React.useState(null);

  const menneske = menneskeId ? SoS_MENNESKER[menneskeId] : null;
  const type = menneske ? SoS_TYPER[menneske.type] : null;
  const brobygger = brobyggerId ? SoS_BROBYGGERE.find(b => b.id === brobyggerId) : null;

  const steps = ['Menneske', 'Brobygger', 'Bekraft'];

  const DURATIONS = [
    { label: '30 min', v: 30 },
    { label: '1 time', v: 60 },
    { label: '1\u00bd time', v: 90 },
    { label: '2 timer', v: 120 },
  ];

  const canNext = (
    (step === 0 && menneskeId) ||
    (step === 1 && brobyggerId) ||
    step === 2
  );

  const fmtDato = (d) => d ? new Date(d).toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' }) : '';

  const handleSend = () => {
    if (!window.PENDING_RING_TASKS) window.PENDING_RING_TASKS = [];
    const bdata = menneske.brobygning || {};
    const dato     = bdata.dato     || aftaleDato;
    const start    = bdata.start    || aftaleStart;
    const duration = bdata.duration || aftaleDuration;

    window.PENDING_RING_TASKS.unshift({
      id: Date.now(),
      menneskeFirstName: menneske.firstName,
      menneskeLastInitial: menneske.lastName[0],
      menneskeContact: menneske.contact,
      brobyggerFirstName: brobygger.name.split(' ')[0],
      dato, start, duration,
      frekvens: bdata.frekvens || null,
      stedNavn: aftaleSted?.navn || null,
      stedType: aftaleSted?.type || null,
      stedSygehus: aftaleSted?.sygehus || null,
      done: false,
    });

    // Tilføj som rigtig aftale i SoS_APPOINTMENTS_BUSY
    const newAppt = {
      id: 'a-' + Date.now(),
      menneskeId:  menneske.id,
      brobyggerId: brobygger.id,
      date:     dato,
      start:    start || '10:00',
      end:      start && duration ? (() => {
        const [h, m] = (start || '10:00').split(':').map(Number);
        const total = h * 60 + m + (parseInt(duration) || 60);
        return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
      })() : '11:00',
      activity: menneske.type === 'sundhed' ? 'Sundhedsbrobygning'
              : menneske.type === 'forening' ? 'Foreningsbrobygning'
              : 'Socialbrobygning',
      location: aftaleSted?.navn || '',
      status: 'pending',
    };
    const updatedAppts = [...(window.SoS_APPOINTMENTS_BUSY || []), newAppt];
    window.SoS_APPOINTMENTS_BUSY = updatedAppts;
    window.SoS_STORE?.save('appointments', updatedAppts);

    setDone(true);
  };

  if (done) return (
    <div style={{ position: 'absolute', inset: 0, background: SoS.cream,
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      justifyContent: 'center', padding: 32 }}>
      <div style={{ width: 72, height: 72, borderRadius: 36, background: SoS.sageSoft,
        display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20 }}>
        <Icon name="check" size={32} color={SoS.sage} weight={2.5}/>
      </div>
      <div style={{ fontFamily: SoS.font, fontSize: 26, fontWeight: 500,
        color: SoS.ink, textAlign: 'center', marginBottom: 8 }}>
        Matching oprettet!
      </div>
      <div style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.inkSoft,
        textAlign: 'center', lineHeight: 1.6, marginBottom: 24 }}>
        {brobygger.name.split(' ')[0]} modtager en besked om aftalen.
      </div>

      {/* Ring og bekraft task card */}
      <div style={{ width: '100%', background: '#fff', borderRadius: SoS.r.xl,
        padding: 20, border: `2px solid ${SoS.orange}33`, marginBottom: 24 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
          <div style={{ width: 38, height: 38, borderRadius: 19,
            background: SoS.orange + '22', display: 'flex',
            alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="phone" size={18} color={SoS.orange}/>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 700, color: SoS.ink }}>
              Din opgave
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft }}>
              Skal gores snarest
            </div>
          </div>
          <span style={{ fontFamily: SoS.sans, fontSize: 10, fontWeight: 700,
            color: SoS.orange, background: SoS.orange + '18',
            padding: '3px 8px', borderRadius: 999 }}>Ventende</span>
        </div>
        <div style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.ink,
          lineHeight: 1.6, marginBottom: 14 }}>
          Ring <strong>{menneske.firstName} {menneske.lastName[0]}.</strong> og bekraft aftalen med{' '}
          {brobygger.name.split(' ')[0]} — {fmtDato((menneske.brobygning || {}).dato || aftaleDato)} kl. {(menneske.brobygning || {}).start || aftaleStart}.
        </div>
        <div style={{ background: SoS.creamDeep, borderRadius: SoS.r.md,
          padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
          <Icon name="phone" size={14} color={SoS.inkSoft}/>
          <div>
            <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkMuted }}>
              {menneske.contact.name}
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 700, color: SoS.ink }}>
              {menneske.contact.phone}
            </div>
          </div>
        </div>
      </div>

      <Button full onClick={onClose}>Luk og ga til oversigt</Button>
    </div>
  );

  return (
    <div style={{ position: 'absolute', inset: 0, background: SoS.cream, display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div style={{ padding: '54px 20px 12px', background: '#fff', borderBottom: `1px solid ${SoS.line}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer',
            fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.inkSoft }}>Afbryd</button>
          <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
            color: SoS.inkMuted, letterSpacing: 1, textTransform: 'uppercase' }}>
            Ny matching · {step + 1}/{steps.length}
          </div>
          <div style={{ width: 60 }}/>
        </div>
        <StepDots step={step} total={steps.length}/>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: 20 }}>

        {/* ── Step 0: Valg menneske ── */}
        {step === 0 && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 24, fontWeight: 500,
              color: SoS.ink, marginBottom: 6, letterSpacing: -0.2 }}>Valg menneske</div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft, marginBottom: 16 }}>
              Mennesker der venter pa match.
            </div>
            {Object.values(SoS_MENNESKER).map(b => {
              const t = SoS_TYPER[b.type];
              const sel = menneskeId === b.id;
              return (
                <React.Fragment key={b.id}>
                <button onClick={() => setMenneskeId(b.id)} style={{
                  display: 'flex', gap: 12, width: '100%', padding: 14,
                  marginBottom: 4, textAlign: 'left',
                  background: sel ? t.soft : '#fff',
                  border: `2px solid ${sel ? t.color : SoS.lineSoft}`,
                  borderRadius: SoS.r.md, cursor: 'pointer',
                }}>
                  <Avatar initials={b.initials} bg={t.color} size={44}/>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink }}>
                      {b.firstName} {b.lastName[0]}. ({b.age})
                    </div>
                    <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, marginTop: 2 }}>
                      {b.needs.slice(0,2).join(' · ')}
                    </div>
                    <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
                      <Pill bg={t.soft} color={t.color}>{t.short}</Pill>
                      <Pill bg={SoS.creamDeep} color={SoS.inkSoft}>{b.language.split(',')[0]}</Pill>
                    </div>
                  </div>
                </button>
                {b.brobygning && (
                  <div style={{ marginBottom: 8, padding: '6px 12px',
                    background: SoS.orange + '12', borderRadius: SoS.r.md,
                    border: `1px solid ${SoS.orange}30`,
                    display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                    <Icon name="match" size={12} color={SoS.orange}/>
                    <span style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.orangeDeep, fontWeight: 600 }}>
                      {new Date(b.brobygning.dato).toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' })}
                      {' kl. '}{b.brobygning.start}
                      {b.brobygning.frekvens ? ' · ' + b.brobygning.frekvens : ''}
                    </span>
                  </div>
                )}
                {b.previousBrobygger && (
                  <div style={{ marginBottom: 8, padding: '4px 10px',
                    background: SoS.orange + '18', borderRadius: 999,
                    display: 'inline-flex', gap: 6, alignItems: 'center' }}>
                    <span style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.orangeDeep, fontWeight: 700 }}>
                      ↩ Ønsker genbrug af brobygger
                    </span>
                  </div>
                )}
              </React.Fragment>
              );
            })}
          </>
        )}


        {/* ── Step 1: Valg brobygger ── */}
        {step === 1 && menneske && (
          <MatchingStepBrobygger
            menneske={menneske}
            brobyggerId={brobyggerId}
            setBrobyggerId={setBrobyggerId}
          />
        )}

        {/* ── Step 2: Bekraft ── */}
        {step === 2 && menneske && brobygger && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 24, fontWeight: 500,
              color: SoS.ink, marginBottom: 20, letterSpacing: -0.2 }}>Bekraft matching</div>

            <div style={{ background: '#fff', borderRadius: SoS.r.xl, padding: 24,
              border: `1px solid ${SoS.lineSoft}`, marginBottom: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 20, marginBottom: 20 }}>
                <div style={{ flex: 1, textAlign: 'center' }}>
                  <Avatar initials={menneske.initials} bg={type.color} size={56}/>
                  <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,
                    color: SoS.ink, marginTop: 8 }}>{menneske.firstName}</div>
                  <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>Menneske</div>
                </div>
                <Icon name="match" size={28} color={SoS.orange}/>
                <div style={{ flex: 1, textAlign: 'center' }}>
                  <Avatar initials={brobygger.avatar} bg={brobygger.bg} size={56}/>
                  <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,
                    color: SoS.ink, marginTop: 8 }}>{brobygger.name.split(' ')[0]}</div>
                  <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>Brobygger</div>
                </div>
              </div>

              <div style={{ paddingTop: 18, borderTop: `1px solid ${SoS.lineSoft}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>Tidspunkt</span>
                  <span style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, color: SoS.ink }}>
                    {new Date((menneske.brobygning || {}).dato || aftaleDato).toLocaleDateString('da-DK', { day: 'numeric', month: 'short' })} kl. {(menneske.brobygning || {}).start || aftaleStart}
                  </span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>Varighed</span>
                  <span style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, color: SoS.ink }}>
                    {DURATIONS.find(d => d.v === ((menneske.brobygning || {}).duration || aftaleDuration))?.label}
                  </span>
                </div>
                {(menneske.brobygning || {}).frekvens && (
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                    <span style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>Frekvens</span>
                    <span style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, color: SoS.ink }}>
                      {menneske.brobygning.frekvens}
                    </span>
                  </div>
                )}
                {aftaleSted ? (
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                    <span style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>Sted</span>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, color: SoS.ink }}>{aftaleSted.navn}</div>
                      {aftaleSted.sygehus && <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>{aftaleSted.sygehus}</div>}
                    </div>
                  </div>
                ) : null}
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>Mennesketype</span>
                  <Pill bg={type.soft} color={type.color}>{type.label}</Pill>
                </div>
              </div>
            </div>

            {/* Brobygger fa besked */}
            <div style={{ padding: 14, background: SoS.sageSoft, borderRadius: SoS.r.md,
              display: 'flex', gap: 10, marginBottom: 10 }}>
              <Icon name="sparkle" size={18} color={SoS.sage}/>
              <div style={{ flex: 1, fontFamily: SoS.sans, fontSize: 12,
                color: SoS.sage, lineHeight: 1.5, fontWeight: 600 }}>
                {brobygger.name.split(' ')[0]} modtager en besked om aftalen.
              </div>
            </div>

            {/* Din opgave */}
            <div style={{ padding: 14, background: SoS.orange + '12', borderRadius: SoS.r.md,
              display: 'flex', gap: 10, border: `1px solid ${SoS.orange}30` }}>
              <Icon name="phone" size={18} color={SoS.orange}/>
              <div style={{ flex: 1, fontFamily: SoS.sans, fontSize: 12,
                color: SoS.orangeDeep, lineHeight: 1.6 }}>
                <strong>Din opgave:</strong> Ring {menneske.firstName} og bekraft aftalen.
                En pgmindelse vises i din oversigt, indtil du krydser den af.
              </div>
            </div>
          </>
        )}

      </div>

      {/* Footer */}
      <div style={{ padding: '16px 20px 34px', background: '#fff',
        borderTop: `1px solid ${SoS.line}`, display: 'flex', gap: 10 }}>
        {step > 0 && <Button variant="secondary" onClick={() => setStep(step - 1)}>Tilbage</Button>}
        <Button full onClick={() => step === 2 ? handleSend() : setStep(step + 1)}
          style={{ flex: 1, opacity: canNext ? 1 : 0.4, pointerEvents: canNext ? 'auto' : 'none' }}>
          {step === 2 ? 'Opret matching' : 'Fortsat'}
        </Button>
      </div>
    </div>
  );
};

const OnboardingWizard = ({ onClose }) => {
  const [step, setStep] = React.useState(0);
  const [data, setData] = React.useState({
    hovedsaede: null, types: [], availability: [], transport: null, languages: [],
  });
  const set = (k, v) => setData(d => ({ ...d, [k]: v }));
  const toggle = (k, v) => setData(d => ({ ...d, [k]: d[k].includes(v) ? d[k].filter(x => x !== v) : [...d[k], v] }));

  const steps = ['Velkommen', 'Hovedsæde', 'Typer', 'Rådighed', 'Sprog', 'Færdig'];

  return (
    <div style={{ position: 'absolute', inset: 0,
      background: step === 0 || step === 5
        ? `linear-gradient(165deg, ${SoS.orangeSoft} 0%, ${SoS.orange} 60%, ${SoS.orangeDeep} 100%)`
        : SoS.cream,
      display: 'flex', flexDirection: 'column',
      color: step === 0 || step === 5 ? '#fff' : SoS.ink, transition: 'background 0.3s',
    }}>
      {step !== 0 && step !== 5 && (
        <div style={{ padding: '54px 20px 12px', background: '#fff', borderBottom: `1px solid ${SoS.line}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <button onClick={() => setStep(step - 1)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
              <Icon name="chevronL" size={22} color={SoS.ink}/>
            </button>
            <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
              color: SoS.inkMuted, letterSpacing: 1, textTransform: 'uppercase' }}>
              {steps[step]} · {step}/{steps.length - 1}
            </div>
            <div style={{ width: 22 }}/>
          </div>
          <StepDots step={step - 1} total={steps.length - 2}/>
        </div>
      )}

      <div style={{ flex: 1, overflowY: 'auto', padding: step === 0 || step === 5 ? '60px 28px 40px' : '24px 20px' }}>
        {step === 0 && (
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
            <SSLogo size={72} bg="rgba(255,255,255,0.2)"/>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 700,
              letterSpacing: 1.5, marginTop: 22, textTransform: 'uppercase', opacity: 0.85 }}>
              Velkommen som brobygger
            </div>
            <div style={{ fontFamily: SoS.font, fontSize: 42, fontWeight: 400,
              lineHeight: 1.05, letterSpacing: -1, marginTop: 12 }}>
              Lad os lære dig<br/><span style={{ fontStyle: 'italic' }}>at kende</span>
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 15, lineHeight: 1.5,
              marginTop: 18, opacity: 0.9, maxWidth: 300 }}>
              Fem hurtige spørgsmål — så kan vi matche dig med mennesker der passer til dig.
            </div>
          </div>
        )}

        {step === 1 && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 26, fontWeight: 500,
              color: SoS.ink, marginBottom: 8, letterSpacing: -0.3 }}>
              Hvilket hovedsæde?
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft, marginBottom: 20 }}>
              Vælg dit nærmeste — du kan altid skifte senere.
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {SoS_HOVEDSAEDER.map(h => {
                const sel = data.hovedsaede === h;
                return (
                  <button key={h} onClick={() => set('hovedsaede', h)} style={{
                    padding: 14, borderRadius: SoS.r.md, textAlign: 'left',
                    background: sel ? '#fff' : '#fff',
                    border: `2px solid ${sel ? (SoS.hq[h] || SoS.orange) : SoS.lineSoft}`,
                    cursor: 'pointer',
                  }}>
                    <div style={{ width: 10, height: 10, borderRadius: 5,
                      background: SoS.hq[h] || SoS.orange, marginBottom: 8 }}/>
                    <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink }}>
                      {h}
                    </div>
                  </button>
                );
              })}
            </div>
          </>
        )}

        {step === 2 && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 26, fontWeight: 500,
              color: SoS.ink, marginBottom: 8, letterSpacing: -0.3 }}>
              Hvilke typer vil du hjælpe med?
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft, marginBottom: 20 }}>
              Vælg én eller flere.
            </div>
            {Object.values(SoS_TYPER).map(t => {
              const sel = data.types.includes(t.id);
              return (
                <button key={t.id} onClick={() => toggle('types', t.id)} style={{
                  display: 'flex', alignItems: 'center', gap: 14, width: '100%',
                  padding: 16, marginBottom: 8, textAlign: 'left',
                  background: sel ? t.soft : '#fff',
                  border: `2px solid ${sel ? t.color : SoS.lineSoft}`,
                  borderRadius: SoS.r.md, cursor: 'pointer',
                }}>
                  <div style={{ width: 44, height: 44, borderRadius: 22,
                    background: sel ? t.color : t.soft, display: 'flex',
                    alignItems: 'center', justifyContent: 'center' }}>
                    <Icon name={t.icon} size={22} color={sel ? '#fff' : t.color}/>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: SoS.sans, fontSize: 15, fontWeight: 600, color: SoS.ink }}>
                      {t.label}
                    </div>
                    <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, marginTop: 2 }}>
                      {t.desc}
                    </div>
                  </div>
                  {sel && <Icon name="check" size={20} color={t.color} weight={2.5}/>}
                </button>
              );
            })}
          </>
        )}

        {step === 3 && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 26, fontWeight: 500,
              color: SoS.ink, marginBottom: 8, letterSpacing: -0.3 }}>
              Hvornår kan du typisk?
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft, marginBottom: 20 }}>
              Dette er bare en vejledende idé — du melder rådighed når det passer dig.
            </div>
            {['Hverdage formiddag', 'Hverdage eftermiddag', 'Hverdage aften', 'Weekend formiddag', 'Weekend eftermiddag'].map(opt => {
              const sel = data.availability.includes(opt);
              return (
                <button key={opt} onClick={() => toggle('availability', opt)} style={{
                  display: 'flex', alignItems: 'center', gap: 14, width: '100%',
                  padding: 14, marginBottom: 6, textAlign: 'left',
                  background: sel ? SoS.orange + '15' : '#fff',
                  border: `2px solid ${sel ? SoS.orange : SoS.lineSoft}`,
                  borderRadius: SoS.r.md, cursor: 'pointer',
                }}>
                  <Icon name="clock" size={20} color={sel ? SoS.orange : SoS.inkMuted}/>
                  <span style={{ flex: 1, fontFamily: SoS.sans, fontSize: 14, fontWeight: 500, color: SoS.ink }}>
                    {opt}
                  </span>
                  {sel && <Icon name="check" size={18} color={SoS.orange} weight={2.5}/>}
                </button>
              );
            })}
          </>
        )}

        {step === 4 && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 26, fontWeight: 500,
              color: SoS.ink, marginBottom: 8, letterSpacing: -0.3 }}>
              Hvilke sprog taler du?
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft, marginBottom: 20 }}>
              Vigtigt for integrationsbrobygninger.
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
              {['Dansk', 'Engelsk', 'Arabisk', 'Tysk', 'Dari', 'Persisk', 'Fransk', 'Spansk', 'Somali', 'Ukrainsk', 'Polsk', 'Tyrkisk'].map(l => {
                const sel = data.languages.includes(l);
                return (
                  <button key={l} onClick={() => toggle('languages', l)} style={{
                    padding: '10px 16px', borderRadius: 999,
                    background: sel ? SoS.orange : '#fff',
                    color: sel ? '#fff' : SoS.ink,
                    border: `2px solid ${sel ? SoS.orange : SoS.lineSoft}`,
                    fontFamily: SoS.sans, fontSize: 14, fontWeight: 500, cursor: 'pointer',
                  }}>{l}</button>
                );
              })}
            </div>
          </>
        )}

        {step === 5 && (
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'center', textAlign: 'center' }}>
            <div style={{ width: 88, height: 88, borderRadius: 44,
              background: 'rgba(255,255,255,0.2)', margin: '0 auto 24px',
              display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="check" size={44} color="#fff" weight={2.5}/>
            </div>
            <div style={{ fontFamily: SoS.font, fontSize: 34, fontWeight: 400,
              lineHeight: 1.1, letterSpacing: -0.6 }}>
              Tak, du er med!
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 15, lineHeight: 1.5,
              marginTop: 14, opacity: 0.92, padding: '0 20px' }}>
              Din koordinator i {data.hovedsaede || 'dit hovedsæde'} kigger på dine svar og vender tilbage inden for få dage.
            </div>
          </div>
        )}
      </div>

      <div style={{ padding: '16px 20px 34px', display: 'flex', gap: 10,
        background: step === 0 || step === 5 ? 'transparent' : '#fff',
        borderTop: step === 0 || step === 5 ? 'none' : `1px solid ${SoS.line}` }}>
        <Button full
          onClick={() => step === 5 ? onClose() : setStep(step + 1)}
          variant={step === 0 || step === 5 ? 'secondary' : 'primary'}
          style={step === 0 || step === 5
            ? { background: '#fff', color: SoS.orange, boxShadow: SoS.shadow.md }
            : {}}>
          {step === 0 ? 'Kom i gang' : step === 5 ? 'Gå til appen' : 'Fortsæt'}
        </Button>
      </div>
    </div>
  );
};

window.MatchingFlow = MatchingFlow;
window.OnboardingWizard = OnboardingWizard;
</script>

<!-- screens-mslogin -->
<script type="text/babel">
// Microsoft login flow — splash → pick account → 2FA → succes
// Modeled on the real Microsoft login screens but in Social Sundhed's warm shell

const MSLogin = ({ onDone, onCancel }) => {
  const [step, setStep] = React.useState(0); // 0 pick, 1 password, 2 2FA, 3 success
  const [code, setCode] = React.useState(['', '', '', '', '', '']);
  const inputRefs = React.useRef([]);

  const handleCode = (i, v) => {
    if (v.length > 1) v = v.slice(-1);
    if (!/^\d*$/.test(v)) return;
    const nc = [...code]; nc[i] = v; setCode(nc);
    if (v && i < 5) inputRefs.current[i+1]?.focus();
    if (nc.every(c => c !== '')) setTimeout(() => setStep(3), 400);
  };

  return (
    <div style={{ position: 'absolute', inset: 0,
      background: `linear-gradient(165deg, ${SoS.cream} 0%, ${SoS.creamDeep} 100%)`,
      display: 'flex', flexDirection: 'column',
    }}>
      {/* Status bar area */}
      <div style={{ height: 44 }}/>

      {/* Microsoft-shell card */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column',
        alignItems: 'center', padding: '20px 20px 40px' }}>

        <button onClick={onCancel} style={{
          alignSelf: 'flex-start', background: 'none', border: 'none',
          padding: '6px 0', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4,
          fontFamily: SoS.sans, fontSize: 14, color: SoS.inkSoft,
        }}>
          <Icon name="chevronL" size={18} color={SoS.inkSoft}/> Tilbage
        </button>

        <div style={{
          marginTop: 30, width: '100%', maxWidth: 360,
          background: '#fff', borderRadius: SoS.r.xl, padding: 32,
          boxShadow: SoS.shadow.lg, border: `1px solid ${SoS.lineSoft}`,
        }}>
          {/* MS logo */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 24 }}>
            <svg width="24" height="24" viewBox="0 0 24 24">
              <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
              <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
              <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
              <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
            </svg>
            <span style={{ fontFamily: SoS.sans, fontSize: 15, fontWeight: 600, color: '#5E5E5E' }}>
              Microsoft
            </span>
          </div>

          {step === 0 && <>
            <div style={{ fontFamily: SoS.sans, fontSize: 22, fontWeight: 600,
              color: SoS.ink, marginBottom: 6 }}>Vælg en konto</div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft, marginBottom: 20 }}>
              til at fortsætte til Social Sundhed
            </div>

            <button onClick={() => setStep(1)} style={{
              display: 'flex', alignItems: 'center', gap: 12, width: '100%',
              padding: '12px 8px', background: 'none', border: 'none',
              borderBottom: `1px solid ${SoS.line}`, cursor: 'pointer', textAlign: 'left',
            }}>
              <Avatar initials="MH" bg={SoS.orange} size={36}/>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink }}>
                  Maja Holmberg
                </div>
                <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft }}>
                  maja.holmberg@socialsundhed.org
                </div>
              </div>
            </button>

            <button style={{
              display: 'flex', alignItems: 'center', gap: 12, width: '100%',
              padding: '12px 8px', background: 'none', border: 'none',
              cursor: 'pointer', textAlign: 'left',
            }}>
              <div style={{ width: 36, height: 36, borderRadius: 18, background: SoS.creamDeep,
                display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name="plus" size={18} color={SoS.inkSoft}/>
              </div>
              <span style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.ink }}>
                Brug en anden konto
              </span>
            </button>
          </>}

          {step === 1 && <>
            <button onClick={() => setStep(0)} style={{
              background: 'none', border: 'none', padding: 0, cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 6, marginBottom: 14,
            }}>
              <Icon name="chevronL" size={14} color={SoS.inkSoft}/>
              <span style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>
                maja.holmberg@socialsundhed.org
              </span>
            </button>

            <div style={{ fontFamily: SoS.sans, fontSize: 22, fontWeight: 600,
              color: SoS.ink, marginBottom: 24 }}>Indtast adgangskode</div>

            <input type="password" defaultValue="••••••••••" autoFocus
              style={{ width: '100%', padding: '12px 0', fontSize: 15,
                fontFamily: SoS.sans, border: 'none',
                borderBottom: `2px solid ${SoS.orange}`, outline: 'none',
                background: 'transparent', color: SoS.ink, marginBottom: 20,
              }}/>

            <button style={{
              background: 'none', border: 'none', padding: 0, cursor: 'pointer',
              fontFamily: SoS.sans, fontSize: 13, color: '#0067B8', marginBottom: 24,
            }}>Glemt adgangskode?</button>

            <button onClick={() => setStep(2)} style={{
              padding: '8px 32px', background: SoS.ink, color: '#fff',
              border: 'none', borderRadius: 0, cursor: 'pointer',
              fontFamily: SoS.sans, fontSize: 14, fontWeight: 500, float: 'right',
            }}>Log ind</button>
            <div style={{ clear: 'both' }}/>
          </>}

          {step === 2 && <>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft, marginBottom: 12 }}>
              maja.holmberg@socialsundhed.org
            </div>

            <div style={{ fontFamily: SoS.sans, fontSize: 22, fontWeight: 600,
              color: SoS.ink, marginBottom: 6 }}>Bekræft din identitet</div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
              lineHeight: 1.5, marginBottom: 20 }}>
              Vi har sendt en kode til <strong>Authenticator</strong> på din telefon.
              Indtast de 6 cifre her.
            </div>

            <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
              {code.map((c, i) => (
                <input key={i} ref={el => inputRefs.current[i] = el}
                  value={c} onChange={e => handleCode(i, e.target.value)}
                  inputMode="numeric" maxLength={1} autoFocus={i === 0}
                  style={{ flex: 1, height: 52, textAlign: 'center',
                    fontFamily: SoS.sans, fontSize: 22, fontWeight: 600,
                    color: SoS.ink, border: `2px solid ${c ? SoS.orange : SoS.line}`,
                    borderRadius: 8, outline: 'none', background: '#fff',
                  }}/>
              ))}

const MessageThread = ({ threadId, onBack, role }) => {
  const thread = SoS_THREADS.find(t => t.id === threadId) || SoS_THREADS[0];
  const [draft, setDraft] = React.useState('');
  const [localMessages, setLocalMessages] = React.useState([]);
  const isBroadcast = !!thread.official;
  const allMessages = [...SoS_MESSAGES, ...localMessages];
  const handleSend = () => {
    if (!draft.trim()) return;
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    setLocalMessages(prev => [...prev, {
      id: 'local-' + Date.now(), from: 'me', time, text: draft.trim()
    }]);
    setDraft('');
  };

  return (
    <div style={{ position: 'absolute', inset: 0, background: SoS.cream,
      display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div style={{ padding: '54px 16px 12px', background: '#fff',
        borderBottom: `1px solid ${SoS.line}`,
        display: 'flex', alignItems: 'center', gap: 12 }}>
        <button onClick={onBack} style={{ background: 'none', border: 'none',
          padding: 4, cursor: 'pointer' }}>
          <Icon name="chevronL" size={22} color={SoS.ink}/>
        </button>
        <Avatar initials={thread.avatar} bg={thread.bg} size={40}/>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink }}>
            {thread.withName}
          </div>
          <div style={{ fontFamily: SoS.sans, fontSize: 11, color: thread.online ? SoS.sage : SoS.inkSoft }}>
            {thread.online ? '\u25cf Online' : thread.withRole}
            {thread.coordinatorReplied && (
              <span style={{ marginLeft: 6, color: SoS.sage }}>· Besvaret ✓</span>
            )}
          </div>
        </div>
        {thread.withRole && thread.withRole.includes('Koordinator') && (
          <a href="tel:+4523456789" style={{ width: 36, height: 36, borderRadius: 18,
            background: SoS.sageSoft, display: 'flex', alignItems: 'center',
            justifyContent: 'center', textDecoration: 'none' }}>
            <Icon name="phone" size={18} color={SoS.sage}/>
          </a>
        )}
      </div>

      {/* Messages */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 16px 8px' }}>
        <div style={{ textAlign: 'center', margin: '8px 0 16px' }}>
          <span style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkMuted,
            background: SoS.creamDeep, padding: '4px 10px', borderRadius: 999 }}>I dag</span>
        </div>

        {isBroadcast && (
          <div style={{ padding: '10px 14px', background: SoS.creamDeep,
            borderRadius: SoS.r.md, marginBottom: 12,
            display: 'flex', gap: 8, alignItems: 'flex-start' }}>
            <Icon name="lock" size={14} color={SoS.orangeDeep}/>
            <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.orangeDeep, lineHeight: 1.5 }}>
              Fællesbesked — du kan ikke svare på denne
            </div>
          </div>
        )}

        {allMessages.map(m => {
          const mine = m.from === 'me';
          return (
            <div key={m.id} style={{ display: 'flex',
              justifyContent: mine ? 'flex-end' : 'flex-start', marginBottom: 6 }}>
              <div style={{ maxWidth: '78%', padding: '10px 14px',
                borderRadius: mine ? `${SoS.r.lg}px ${SoS.r.lg}px 6px ${SoS.r.lg}px`
                  : `${SoS.r.lg}px ${SoS.r.lg}px ${SoS.r.lg}px 6px`,
                background: mine ? SoS.orange : '#fff', color: mine ? '#fff' : SoS.ink,
                fontFamily: SoS.sans, fontSize: 14, lineHeight: 1.4,
                boxShadow: mine ? 'none' : SoS.shadow.sm }}>
                {m.text}
                <div style={{ fontSize: 10, marginTop: 4,
                  opacity: mine ? 0.7 : 0.5, fontWeight: 400 }}>
                  {m.time}{mine && ' \u00b7 L\u00e6st'}
                </div>
              </div>
            </div>
          );
        })}

        {!isBroadcast && (
          <div style={{ display: 'flex', gap: 4, padding: '8px 14px', alignItems: 'center' }}>
            {[0,1,2].map(i => (
              <div key={i} style={{ width: 6, height: 6, borderRadius: 3,
                background: SoS.inkMuted, opacity: 0.4 }}/>
            ))}
            <span style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkMuted, marginLeft: 4 }}>
              Linda skriver...
            </span>
          </div>
        )}
      </div>

      {/* Composer */}
      {!isBroadcast ? (
        <div style={{ padding: '12px 16px 30px', background: '#fff',
          borderTop: `1px solid ${SoS.line}`,
          display: 'flex', gap: 8, alignItems: 'flex-end' }}>
          <button style={{ width: 38, height: 38, borderRadius: 19,
            background: SoS.creamDeep, border: 'none', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <Icon name="plus" size={20} color={SoS.ink}/>
          </button>
          <div style={{ flex: 1, background: SoS.creamDeep, borderRadius: 22,
            padding: '10px 14px', minHeight: 38 }}>
            <textarea value={draft} onChange={e => setDraft(e.target.value)}
              placeholder={`Skriv til ${thread.withName.split(' ')[0]}...`} rows={1}
              style={{ width: '100%', background: 'transparent', border: 'none',
                outline: 'none', fontFamily: SoS.sans, fontSize: 14, color: SoS.ink,
                resize: 'none' }}/>
          </div>
          <button style={{ width: 38, height: 38, borderRadius: 19,
            background: draft ? SoS.orange : SoS.creamDeep, border: 'none',
            cursor: draft ? 'pointer' : 'default',
            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
            transition: 'background 0.2s' }}
            onClick={handleSend} disabled={!draft.trim()}>
            <Icon name="chevron" size={18} color={draft ? '#fff' : SoS.inkMuted} weight={2.5}/>
          </button>
        </div>
      ) : (
        <div style={{ padding: '12px 16px 30px', background: '#fff',
          borderTop: `1px solid ${SoS.line}` }}>
          <div style={{ padding: '12px 14px', background: SoS.creamDeep, borderRadius: SoS.r.md,
            fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, textAlign: 'center' }}>
            Fællesbesked · kan ikke besvares
          </div>
        </div>
      )}
    </div>
  );
};

window.MessagesList = MessagesList;
window.MessageThread = MessageThread;
window.ComposeMessage = ComposeMessage;
</script>

<script type="text/babel">
// Export / fund report screens — what admins see when generating an SROI report

// SROI (Social Return on Investment) model for Social Sundhed
// Each brobygning type has an assumed social value per completed appointment
const SROI_RATES = {
  sundhed:   { perMeeting: 1840, label: 'Sundhedsbrobygning', color: '#2E86C8', soft: '#D3EAF8',
               outcome: 'Undgået indlæggelse / forbedret sundhedsadfærd' },
  forening:  { perMeeting: 1420, label: 'Foreningsbrobygning', color: '#27B87A', soft: '#C8F0DE',
               outcome: 'Øget tilknytning til arbejdsmarked / uddannelse' },
  social:    { perMeeting: 1260, label: 'Socialbrobygning', color: '#E0517A', soft: '#F9D3DF',
               outcome: 'Mindsket ensomhed / øget livskvalitet' },
};

// Mock aggregated data — this year-to-date, across all hovedsæder
const REPORT_DATA = {
  period: 'Jan–apr 2026',
  totals: {
    brobygninger: 847,
    completed: 2134,
    contacts: 3891,
    activeBrobyggere: 412,
    aktiveMennesker: 689,
  },
  byType: {
    sundhed: { brobygninger: 213, completed: 521 },
    forening: { brobygninger: 284, completed: 702 },
    social: { brobygninger: 350, completed: 911 },
  },
  byHovedsaede: [
    { name: 'Hovedstaden', brobygninger: 184, ratio: 1.00 },
    { name: 'Aarhus',      brobygninger: 142, ratio: 0.77 },
    { name: 'Sjælland',    brobygninger: 118, ratio: 0.64 },
    { name: 'Midt',        brobygninger: 98,  ratio: 0.53 },
    { name: 'Syd',         brobygninger: 86,  ratio: 0.47 },
    { name: 'Nord',        brobygninger: 74,  ratio: 0.40 },
    { name: 'Kronjylland', brobygninger: 62,  ratio: 0.34 },
    { name: 'Sydvest',     brobygninger: 53,  ratio: 0.29 },
    { name: 'Fyn',         brobygninger: 30,  ratio: 0.16 },
  ],
  monthlyCompleted: [412, 456, 523, 578, 605, 611, 583, 524, 498, 467, 534, 602],
};

// Calculate total SROI value (uses window.SROI_SETTINGS if admin has saved custom rates)
const calcSROI = () => {
  const custom = window.SROI_SETTINGS;
  let total = 0;
  Object.entries(REPORT_DATA.byType).forEach(([k, v]) => {
    const rate = custom ? (custom[k] || SROI_RATES[k].perMeeting) : SROI_RATES[k].perMeeting;
    total += v.completed * rate;
  });
  return total;
};

const formatKr = (n) => {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace('.', ',') + ' mio.';
  if (n >= 1000) return Math.round(n / 1000) + 'k';
  return n.toString();
};

// Main export screen — looks like a report preview with SROI analytics
const ExportReport = ({ onClose }) => {
  const [selectedType, setSelectedType] = React.useState('all');
  const [format, setFormat] = React.useState('pdf');
  const [view, setView] = React.useState('preview'); // 'preview' | 'configure'

  const sroiTotal = calcSROI();
  const investment = (window.SROI_SETTINGS && window.SROI_SETTINGS.investment) || 8_400_000;
  const ratio = (sroiTotal / investment).toFixed(2);
  const [exported, setExported] = React.useState(false);
  const [shared, setShared] = React.useState(false);
  const handleExport = () => { setExported(true); setTimeout(() => setExported(false), 2500); };
  const handleShare  = () => { setShared(true);   setTimeout(() => setShared(false),  2500); };

  return (
    <div style={{ position: 'absolute', inset: 0, background: SoS.cream,
      display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div style={{ padding: '54px 16px 12px', background: SoS.ink, color: '#fff' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <button onClick={onClose} style={{ background: 'none', border: 'none',
            color: '#fff', cursor: 'pointer', padding: 4 }}>
            <Icon name="x" size={22} color="#fff"/>
          </button>
          <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
            letterSpacing: 1, opacity: 0.6, textTransform: 'uppercase' }}>
            SROI-rapport
          </div>
          <button onClick={handleExport} style={{ background: exported ? SoS.sage : SoS.orange, color: '#fff',
            border: 'none', padding: '6px 14px', borderRadius: 999, cursor: 'pointer',
            fontFamily: SoS.sans, fontSize: 12, fontWeight: 600,
            display: 'flex', alignItems: 'center', gap: 4, transition: 'background 0.2s',
          }}>
            <Icon name={exported ? 'check' : 'download'} size={14} color="#fff" weight={2.3}/>
            {exported ? 'Sendt!' : 'Eksportér'}

        </div>
        <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500,
          letterSpacing: -0.2 }}>Social Return on Investment</div>
        <div style={{ fontFamily: SoS.sans, fontSize: 12, opacity: 0.7, marginTop: 2 }}>
          {REPORT_DATA.period} · Alle hovedsæder · Udkast til Velux Fonden
        </div>
      </div>

      {/* Tab switcher */}
      <div style={{ display: 'flex', background: '#fff', borderBottom: `1px solid ${SoS.line}` }}>
        {[
          { k: 'preview', l: 'Forhåndsvisning' },
          { k: 'configure', l: 'Konfigurér' },
        ].map(t => (
          <button key={t.k} onClick={() => setView(t.k)} style={{

            fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>{t.l}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflowY: 'auto' }}>
        {view === 'preview' ? (
          <div style={{ padding: 16 }}>
            {/* Hero — total SROI value */}
            <div style={{
              background: `linear-gradient(135deg, ${SoS.orangeDeep}, ${SoS.orange})`,
              borderRadius: SoS.r.xl, padding: 22, color: '#fff', marginBottom: 12,
              position: 'relative', overflow: 'hidden',
            }}>
              <div style={{ position: 'absolute', top: -40, right: -40, width: 160, height: 160,
                borderRadius: '50%', background: 'rgba(255,255,255,0.08)' }}/>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                letterSpacing: 1, opacity: 0.8, textTransform: 'uppercase' }}>
                Samlet SROI-værdi

                {formatKr(sroiTotal)} kr

                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 10, opacity: 0.8 }}>Ratio</div>
                  <div style={{ fontFamily: SoS.font, fontSize: 18, marginTop: 2 }}>
                    1 : {ratio}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 10, opacity: 0.8 }}>Brobygninger</div>
                  <div style={{ fontFamily: SoS.font, fontSize: 18, marginTop: 2 }}>
                    {REPORT_DATA.totals.brobygninger}
                  </div>
                </div>
              </div>
            </div>

            <div style={{ background: '#fff', borderRadius: SoS.r.lg, padding: 16,
              border: `1px solid ${SoS.lineSoft}`, marginBottom: 12 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase',
                marginBottom: 10 }}>SROI-beregning</div>
              {Object.entries(REPORT_DATA.byType).map(([k, v]) => {
                const r = SROI_RATES[k];
                const value = v.completed * r.perMeeting;
                return (
                  <div key={k} style={{ padding: '10px 0',
                    borderBottom: `1px solid ${SoS.lineSoft}` }}>
                    <div style={{ display: 'flex', alignItems: 'center',
                      justifyContent: 'space-between', marginBottom: 6 }}>

                          fontWeight: 600, color: SoS.ink }}>{r.label}</span>

                        fontWeight: 500, color: SoS.ink }}>

                    <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkMuted,
                      marginLeft: 16 }}>

                      color: r.color, marginLeft: 16, marginTop: 2, fontStyle: 'italic' }}>

                  </div>

              <div style={{ padding: '12px 0 0', display: 'flex',
                justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontFamily: SoS.sans, fontSize: 13,
                  fontWeight: 700, color: SoS.ink }}>Total</span>
                <span style={{ fontFamily: SoS.font, fontSize: 22,
                  fontWeight: 500, color: SoS.orange }}>
                  {formatKr(sroiTotal)} kr
                </span>
              </div>
            </div>

            {/* Assumptions */}
            <div style={{ background: SoS.creamDeep, borderRadius: SoS.r.md,
              padding: 14, marginBottom: 12 }}>
              <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                <Icon name="note" size={16} color={SoS.orangeDeep}/>
                <div>
                  <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600,
                    color: SoS.orangeDeep, marginBottom: 2 }}>Antagelser</div>
                  <div style={{ fontFamily: SoS.sans, fontSize: 11,
                    color: SoS.orangeDeep, lineHeight: 1.5 }}>
                    Tal per møde er baseret på <strong>VIVE (2023)</strong> og
                    <strong> Rambøll SROI-guide for civilsamfund</strong>.
                    Dead-weight og attribution er fratrukket (−28%).
                    Sensitivity ±15% vedlagt som bilag.
                  </div>
                </div>
              </div>
            </div>

            {/* Per-hovedsaede bar chart */}
            <div style={{ background: '#fff', borderRadius: SoS.r.lg, padding: 16,
              border: `1px solid ${SoS.lineSoft}`, marginBottom: 12 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase',
                marginBottom: 14 }}>Brobygninger per hovedsæde</div>
              {REPORT_DATA.byHovedsaede.map(h => (
                <div key={h.name} style={{ marginBottom: 8 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between',
                    alignItems: 'baseline', marginBottom: 3 }}>
                    <span style={{ fontFamily: SoS.sans, fontSize: 12,
                      color: SoS.ink }}>{h.name}</span>
                    <span style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600,
                      color: SoS.ink }}>{h.brobygninger}</span>
                  </div>
                  <div style={{ height: 6, borderRadius: 3, background: SoS.creamDeep }}>
                    <div style={{ height: '100%', borderRadius: 3,
                      width: `${h.ratio * 100}%`,
                      background: SoS.hq[h.name] || SoS.orange,
                    }}/>
                  </div>
                </div>
              ))}
