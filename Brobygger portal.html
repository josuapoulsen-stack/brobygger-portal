<!-- persistence -->
<script>
// ── SoS_STORE — localStorage persistence ────────────────────────────────────
// PROTOTYPE ONLY — skal fjernes og erstattes af API-kald inden go-live.
// Nøgler: sos_mennesker · sos_brobyggere · sos_appointments
//         sos_medarbejdere · sos_settings
(function () {
  const P = 'sos_';
  const save = (key, data) => {
    try { localStorage.setItem(P + key, JSON.stringify(data)); } catch(e) {}
  };
  const load = (key) => {
    try { const r = localStorage.getItem(P + key); return r ? JSON.parse(r) : null; }
    catch(e) { return null; }
  };
  const clear = () => {
    Object.keys(localStorage).filter(k => k.startsWith(P)).forEach(k => localStorage.removeItem(k));
  };

  // Overskriver in-memory globals med persisterede data ved opstart
  const hydrate = () => {
    const m  = load('mennesker');    if (m)  window.SoS_MENNESKER       = m;
    const b  = load('brobyggere');   if (b)  window.SoS_BROBYGGERE       = b;
    const a  = load('appointments'); if (a)  window.SoS_APPOINTMENTS_BUSY = a;
    const me = load('medarbejdere'); if (me) window.SoS_MEDARBEJDERE      = me;
    const s  = load('settings');
    if (s) {
      if (s.sroi)        window.SROI_SETTINGS     = s.sroi;
      if (s.matchFrist)  window.MATCH_FRIST_TIMER = s.matchFrist;
      if (s.activeTypes) window.HQ_ACTIVE_TYPES   = s.activeTypes;
    }
  };

  window.SoS_STORE = { save, load, clear, hydrate };
  hydrate();
})();
</script>

};

// Primary button

// Section header

// Tab bar — bottom nav

// Screen wrapper — scrollable content area inside the phone
const Screen = ({ children, bg = SoS.cream, padTop = 0, padBottom = 110 }) => (

// Top bar (custom — simpler than IOSNavBar for app feel)
const TopBar = ({ title, subtitle, leading, trailing, bg = SoS.cream, style = {} }) => (

        color: SoS.ink, letterSpacing: -0.3, lineHeight: 1.1 }}>{title}</div>

);

Object.assign(window, {
  Icon, SSLogo, Avatar, Pill, Card, Button, SectionHead, TabBar, Screen, TopBar,
});
</script>

<!-- charts -->
<script type="text/babel">
// Admin — ansat mobile view with rich data

// Small bar chart component
const MiniBars = ({ data, color = SoS.orange, height = 60, labels = true }) => {
  const max = Math.max(...data.map(d => d.v));
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column',
          alignItems: 'center', gap: 4 }}>
          <div style={{ fontFamily: SoS.sans, fontSize: 10, fontWeight: 600, color: SoS.ink }}>
            {d.v}
          </div>
          <div style={{
            width: '100%', borderRadius: 4,
            background: color, opacity: 0.4 + (d.v / max) * 0.6,
            height: `${(d.v / max) * (height - 20)}px`,
            minHeight: 2,
          }} />
          {labels && <div style={{ fontFamily: SoS.sans, fontSize: 9,
            color: SoS.inkMuted }}>{d.l}</div>}
        </div>
      ))}
    </div>
  );
};

// Donut — distribution across 3 types
const TypeDonut = ({ sundhed, forening, social, size = 140 }) => {
  const total = sundhed + forening + social;
  const r = size / 2 - 14;
  const c = 2 * Math.PI * r;
  let offset = 0;
  const segs = [
    { v: sundhed, color: SoS_TYPER.sundhed.color },
    { v: forening, color: SoS_TYPER.forening.color },
    { v: social, color: SoS_TYPER.social.color },
  ];
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        {segs.map((s, i) => {
          const len = (s.v / total) * c;
          const el = (
            <circle key={i} cx={size/2} cy={size/2} r={r} fill="none"
              stroke={s.color} strokeWidth={14}
              strokeDasharray={`${len} ${c - len}`}
              strokeDashoffset={-offset}
              strokeLinecap="butt" />
          );
          offset += len;
          return el;
        })}
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex',
        flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontFamily: SoS.font, fontSize: 28, fontWeight: 500, color: SoS.ink, lineHeight: 1 }}>
          {total}
        </div>
        <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft,
          marginTop: 4, textAlign: 'center' }}>mennesker<br/>i alt</div>
      </div>
    </div>
  );
};

// Area chart (simple sparkline)
const AreaChart = ({ data, color = SoS.orange, height = 80, fill = true }) => {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const w = 300;
  const pts = data.map((v, i) => [i / (data.length - 1) * w, height - ((v - min) / range) * (height - 10) - 5]);
  const path = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0]},${p[1]}`).join(' ');
  const area = path + ` L${w},${height} L0,${height} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${height}`} style={{ width: '100%', height, display: 'block' }} preserveAspectRatio="none">
      {fill && <path d={area} fill={color} fillOpacity="0.12" />}
      <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map((p, i) => i === pts.length - 1 && (
        <circle key={i} cx={p[0]} cy={p[1]} r="4" fill={color} stroke="#fff" strokeWidth="2" />
      ))}
    </svg>
  );
};

// Stacked horizontal bar
const StackedBar = ({ segments, height = 10 }) => {
  const total = segments.reduce((s, x) => s + x.v, 0);
  return (
    <div style={{ display: 'flex', width: '100%', height, borderRadius: height/2, overflow: 'hidden' }}>
      {segments.map((s, i) => (
        <div key={i} style={{ width: `${(s.v/total)*100}%`, background: s.color }} />
      ))}
    </div>
  );
};

// Big KPI card
const KPI = ({ label, value, delta, color = SoS.orange, sparkData, subtitle }) => (
  <div style={{
    background: '#fff', borderRadius: SoS.r.lg, padding: 16,
    border: `1px solid ${SoS.lineSoft}`,
  }}>
    <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 600,
      color: SoS.inkSoft, letterSpacing: 0.5, textTransform: 'uppercase',
      marginBottom: 6 }}>{label}</div>
    <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: subtitle || sparkData ? 4 : 0 }}>
      <div style={{ fontFamily: SoS.font, fontSize: 30, fontWeight: 500, color: SoS.ink, lineHeight: 1 }}>
        {value}
      </div>
      {delta && (
        <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600,
          color: delta.startsWith('+') ? SoS.sage : SoS.rose }}>
          {delta}
        </div>
      )}
    </div>
    {subtitle && <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft }}>{subtitle}</div>}
    {sparkData && <div style={{ marginTop: 8 }}><AreaChart data={sparkData} color={color} height={40}/></div>}
  </div>
);

Object.assign(window, { MiniBars, TypeDonut, AreaChart, StackedBar, KPI });
</script>

<!-- ios-frame -->
<script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',

Object.assign(window, {

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

const formatDate = (iso, opts = {}) => {
  const d = new Date(iso);

  const months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];

  if (opts.short) return `${d.getDate()}. ${months[d.getMonth()]}`;
  return `${days[d.getDay()]}. ${d.getDate()}. ${months[d.getMonth()]}`;
};

<script type="text/babel">
// Kalender — rådighed og aftaler (brobygger)

const CalendarScreen = ({ appointments, shifts, onOpenAppt, onAddShift }) => {
  const [month, setMonth] = React.useState(new Date('2026-04-24'));
  const prevMonth = () => setMonth(d => new Date(d.getFullYear(), d.getMonth() - 1, 1));
  const nextMonth = () => setMonth(d => new Date(d.getFullYear(), d.getMonth() + 1, 1));
  const [selected, setSelected] = React.useState('2026-04-27');
  const [addShiftSheet, setAddShiftSheet] = React.useState(false);
  const [addShiftDone, setAddShiftDone] = React.useState(false);
  const [moreShift, setMoreShift] = React.useState(null);

  // Build calendar grid
  const year = month.getFullYear();
  const m = month.getMonth();
  const firstDay = new Date(year, m, 1);
  const daysInMonth = new Date(year, m + 1, 0).getDate();
  const startWeekday = (firstDay.getDay() + 6) % 7; // Monday-first
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const apptsByDate = {};
  appointments.forEach(a => { (apptsByDate[a.date] ||= []).push(a); });
  const shiftsByDate = {};
  shifts.forEach(s => { (shiftsByDate[s.date] ||= []).push(s); });

  const monthName = ['Januar','Februar','Marts','April','Maj','Juni','Juli','August','September','Oktober','November','December'][m];

  const selectedAppts = apptsByDate[selected] || [];
  const selectedShifts = shiftsByDate[selected] || [];

  return (
    <>
      <TopBar
        title="Kalender"
        subtitle="Dine vagter og aftaler"
        trailing={
          <button onClick={() => setAddShiftSheet(true)} style={{
            height: 44, padding: '0 16px', borderRadius: 22,
            background: SoS.orange, color: '#fff', border: 'none',
            display: 'flex', alignItems: 'center', gap: 6,
            fontFamily: SoS.sans, fontSize: 14, fontWeight: 600,
            boxShadow: SoS.shadow.glow, cursor: 'pointer',
          }}>
            <Icon name="plus" size={18} color="#fff" weight={2.5} />
            Rådighed
          </button>
        }
      />

      {/* Month header */}
      <div style={{ padding: '4px 20px 16px', display: 'flex',
        alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500,
          color: SoS.ink, letterSpacing: -0.2 }}>{monthName} {year}</div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button onClick={prevMonth} style={{ width: 36, height: 36, borderRadius: 18,
            background: '#fff', border: `1px solid ${SoS.line}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
            <Icon name="chevronL" size={18} color={SoS.ink} />
          </button>
          <button onClick={nextMonth} style={{ width: 36, height: 36, borderRadius: 18,
            background: '#fff', border: `1px solid ${SoS.line}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
            <Icon name="chevron" size={18} color={SoS.ink} />
          </button>
        </div>
      </div>

      {/* Week headers */}
      <div style={{ padding: '0 20px', display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)',
        gap: 0, marginBottom: 8 }}>
        {['M','T','O','T','F','L','S'].map((d, i) => (
          <div key={i} style={{ textAlign: 'center', fontFamily: SoS.sans,
            fontSize: 11, fontWeight: 600, color: SoS.inkMuted, letterSpacing: 0.8 }}>{d}</div>
        ))}
      </div>

      {/* Grid */}
      <div style={{ padding: '0 12px 20px', display: 'grid',
        gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} />;
          const iso = `${year}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const isSel = iso === selected;
          const isToday = iso === '2026-04-27';
          const hasAppts = (apptsByDate[iso] || []).length;
          const hasShifts = (shiftsByDate[iso] || []).length;
          return (
            <button key={i} onClick={() => setSelected(iso)} style={{
              aspectRatio: '1', border: 'none', cursor: 'pointer',
              background: isSel ? SoS.orange : 'transparent',
              borderRadius: 12, padding: 0, position: 'relative',
              display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center',
              color: isSel ? '#fff' : SoS.ink,
            }}>
              <div style={{
                fontFamily: SoS.sans, fontSize: 15,
                fontWeight: isToday || isSel ? 700 : 500,
                color: isSel ? '#fff' : (isToday ? SoS.orange : SoS.ink),
              }}>{d}</div>
              {(hasAppts || hasShifts) && (
                <div style={{ display: 'flex', gap: 2, marginTop: 2, height: 4 }}>
                  {hasAppts > 0 && <div style={{ width: 4, height: 4, borderRadius: 2,
                    background: isSel ? '#fff' : SoS.orange }} />}
                  {hasShifts > 0 && <div style={{ width: 4, height: 4, borderRadius: 2,
                    background: isSel ? 'rgba(255,255,255,0.6)' : SoS.sage }} />}
                </div>
              )}
            </button>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{ padding: '0 20px 16px', display: 'flex', gap: 18 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <div style={{ width: 8, height: 8, borderRadius: 4, background: SoS.orange }} />
          <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft }}>Aftale</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <div style={{ width: 8, height: 8, borderRadius: 4, background: SoS.sage }} />
          <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft }}>Rådighed</div>
        </div>
      </div>

      {/* Selected day details */}
      <div style={{ padding: '0 20px 20px' }}>
        <SectionHead title={formatDate(selected, { long: true })} />

        {selectedAppts.length === 0 && selectedShifts.length === 0 && (
          <div style={{ padding: '28px 20px', background: '#fff', borderRadius: SoS.r.lg,
            border: `1px dashed ${SoS.line}`, textAlign: 'center' }}>
            <div style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.inkSoft, marginBottom: 12 }}>
              Ingen aftaler eller vagter
            </div>
            <Button variant="secondary" onClick={() => setAddShiftSheet(true)}
              icon={<Icon name="plus" size={16} color={SoS.ink} weight={2.3} />}>
              Meld rådig denne dag
            </Button>
          </div>
        )}

        {selectedAppts.map(a => {
          const menneske = SoS_MENNESKER[a.menneskeId];
          const type = SoS_TYPER[menneske.type];
          return (
            <div key={a.id} onClick={() => onOpenAppt(a.id)} style={{
              display: 'flex', gap: 12, padding: 14, background: '#fff',
              borderRadius: SoS.r.md, marginBottom: 8, cursor: 'pointer',
              border: `1px solid ${SoS.lineSoft}`, borderLeft: `4px solid ${SoS.orange}`,
            }}>
              <div style={{ textAlign: 'center', minWidth: 48 }}>
                <div style={{ fontFamily: SoS.font, fontSize: 18, fontWeight: 500, color: SoS.ink }}>{a.start}</div>
                <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkMuted }}>{a.end}</div>
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink, marginBottom: 2 }}>
                  {menneske.firstName} ({menneske.age})
                </div>
                <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft, marginBottom: 6 }}>
                  {a.activity}
                </div>
                <Pill bg={type.soft} color={type.color}
                  icon={<Icon name={type.icon} size={11} color={type.color} weight={2.2} />}>
                  {type.short}
                </Pill>
              </div>
              <Icon name="chevron" size={18} color={SoS.inkMuted} />
            </div>
          );
        })}

        {selectedShifts.map(s => (
          <div key={s.id} style={{
            display: 'flex', gap: 12, padding: 14, background: SoS.sageSoft + '66',
            borderRadius: SoS.r.md, marginBottom: 8,
            border: `1px solid ${SoS.sage}33`, borderLeft: `4px solid ${SoS.sage}`,
          }}>
            <div style={{ textAlign: 'center', minWidth: 48 }}>
              <div style={{ fontFamily: SoS.font, fontSize: 18, fontWeight: 500, color: SoS.sage }}>{s.start}</div>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>{s.end}</div>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink, marginBottom: 2 }}>
                Rådighed
              </div>
              <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>
                Afventer match fra koordinator
              </div>
            </div>
            <button onClick={() => setMoreShift(s)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
              <Icon name="more" size={20} color={SoS.inkSoft} />
            </button>
          </div>
        ))}
      </div>

      {/* Add-shift bottom sheet */}
      {addShiftSheet && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 400, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}
          onClick={() => { setAddShiftSheet(false); setAddShiftDone(false); }}>
          <div style={{ background: '#fff', borderRadius: '20px 20px 0 0', padding: '24px 20px 40px',
            boxShadow: '0 -4px 32px rgba(0,0,0,0.12)' }} onClick={e => e.stopPropagation()}>
            {addShiftDone ? (
              <div style={{ textAlign: 'center', padding: '16px 0' }}>
                <div style={{ width: 56, height: 56, borderRadius: 28, background: SoS.sage,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
                  <Icon name="check" size={28} color="#fff" weight={2.5} />
                </div>
                <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500, color: SoS.ink, marginBottom: 8 }}>
                  Rådighed meldt!
                </div>
                <div style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.inkSoft, marginBottom: 24 }}>
                  Koordinatoren kan nu matche dig med en borger {selected ? 'd. ' + selected.split('-').reverse().join('/') : 'denne dag'}.
                </div>
                <Button full onClick={() => { setAddShiftSheet(false); setAddShiftDone(false); }}>Luk</Button>
              </div>
            ) : (
              <>
                <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500, color: SoS.ink, marginBottom: 6 }}>
                  Meld rådighed
                </div>
                <div style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.inkSoft, marginBottom: 20 }}>
                  {selected ? formatDate(selected, { long: true }) : 'Valgt dag'}
                </div>
                <div style={{ display: 'flex', gap: 10, marginBottom: 16 }}>
                  {[['08:00','12:00','Formiddag'],['12:00','16:00','Eftermiddag'],['16:00','20:00','Aften']].map(([start, end, label]) => (
                    <div key={label} style={{ flex: 1, border: `2px solid ${SoS.line}`, borderRadius: SoS.r.md,
                      padding: '12px 8px', textAlign: 'center', cursor: 'pointer',
                      fontFamily: SoS.sans, fontSize: 13, color: SoS.ink }}
                      onClick={() => setAddShiftDone(true)}>
                      <div style={{ fontWeight: 600, marginBottom: 2 }}>{label}</div>
                      <div style={{ fontSize: 11, color: SoS.inkSoft }}>{start}–{end}</div>
                    </div>
                  ))}
                </div>
                <Button full onClick={() => setAddShiftDone(true)}>Bekræft rådighed</Button>
                <button onClick={() => setAddShiftSheet(false)} style={{ width: '100%', marginTop: 10,
                  background: 'none', border: 'none', fontFamily: SoS.sans, fontSize: 14,
                  color: SoS.inkSoft, cursor: 'pointer', padding: 10 }}>
                  Annuller
                </button>
              </>
            )}
          </div>
        </div>
      )}

      {/* Shift "more" bottom sheet */}
      {moreShift && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 400, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}
          onClick={() => setMoreShift(null)}>
          <div style={{ background: '#fff', borderRadius: '20px 20px 0 0', padding: '24px 20px 40px',
            boxShadow: '0 -4px 32px rgba(0,0,0,0.12)' }} onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily: SoS.font, fontSize: 20, fontWeight: 500, color: SoS.ink, marginBottom: 4 }}>
              Rådighed kl. {moreShift.start}–{moreShift.end}
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft, marginBottom: 20 }}>
              Afventer match fra koordinator
            </div>
            <button style={{ width: '100%', padding: '14px 0', background: SoS.creamDeep,
              border: 'none', borderRadius: SoS.r.md, fontFamily: SoS.sans, fontSize: 15,
              fontWeight: 600, color: SoS.red || '#D64545', cursor: 'pointer', marginBottom: 10 }}
              onClick={() => setMoreShift(null)}>
              Fjern rådighed
            </button>
            <button style={{ width: '100%', padding: '14px 0', background: 'none',
              border: 'none', fontFamily: SoS.sans, fontSize: 14, color: SoS.inkSoft,
              cursor: 'pointer' }}
              onClick={() => setMoreShift(null)}>
              Luk
            </button>
          </div>
        </div>
      )}
    </>
  );
};

window.CalendarScreen = CalendarScreen;
</script>

<!-- screens-detail -->
<script type="text/babel">
// Aftaledetaljer — sensitive citizen info

const SecuritySeal = () => (
  <div style={{
    display: 'inline-flex', alignItems: 'center', gap: 6,
    padding: '4px 10px', borderRadius: 999,
    background: SoS.skySoft + '88', border: `1px solid ${SoS.sky}33`,
  }}>
    <Icon name="shield" size={12} color={SoS.sky} weight={2.2} />
    <span style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 600, color: SoS.sky }}>
      Fortroligt
    </span>
  </div>
);

const InfoRow = ({ icon, label, value, action, multiline = false }) => (
  <div style={{
    display: 'flex', gap: 12, padding: '14px 16px',
    borderBottom: `1px solid ${SoS.lineSoft}`,
    alignItems: multiline ? 'flex-start' : 'center',
  }}>
    <div style={{ width: 32, height: 32, borderRadius: 16,
      background: SoS.creamDeep, display: 'flex',
      alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
      <Icon name={icon} size={16} color={SoS.orange} weight={2} />
    </div>
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 600,
        color: SoS.inkMuted, letterSpacing: 0.5, textTransform: 'uppercase',
        marginBottom: 2 }}>{label}</div>
      <div style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.ink,
        lineHeight: 1.4 }}>{value}</div>
    </div>
    {action && (
      <button style={{
        width: 36, height: 36, borderRadius: 18, background: SoS.cream,
        border: 'none', display: 'flex', alignItems: 'center',
        justifyContent: 'center', cursor: 'pointer', flexShrink: 0,
      }}>{action}</button>
    )}
  </div>
);

const AppointmentDetailScreen = ({ appt, onBack, onComplete }) => {
  const [revealed, setRevealed] = React.useState(false);
  const [showCancel, setShowCancel] = React.useState(false);
  const [cancelled, setCancelled] = React.useState(false);
  const menneske = SoS_MENNESKER[appt.menneskeId];
  const type = SoS_TYPER[menneske.type];

  const downloadICS = () => {
    const dt = appt.date.replace(/-/g, '');
    const ts = appt.start.replace(':', '') + '00';
    const te = appt.end.replace(':', '') + '00';
    const lines = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//SoS Brobygger Portal//DA',
      'BEGIN:VEVENT',
      'DTSTART:' + dt + 'T' + ts,
      'DTEND:' + dt + 'T' + te,
      'SUMMARY:Brobygning – ' + (menneske ? menneske.firstName : '') + ' (' + appt.activity + ')',
      'DESCRIPTION:' + appt.activity,
      'LOCATION:' + appt.location,
      'STATUS:' + (appt.status === 'confirmed' ? 'CONFIRMED' : 'TENTATIVE'),
      'END:VEVENT',
      'END:VCALENDAR',
    ];
    const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'brobygning-' + appt.date + '.ics'; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ background: SoS.cream, minHeight: '100%' }}>
      {/* Hero with back button */}
      <div style={{
        background: `linear-gradient(160deg, ${type.color} 0%, ${type.color}DD 100%)`,
        padding: '54px 20px 28px', color: '#fff',
        borderBottomLeftRadius: 28, borderBottomRightRadius: 28,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between',
          alignItems: 'center', marginBottom: 22 }}>
          <button onClick={onBack} style={{
            width: 40, height: 40, borderRadius: 20,
            background: 'rgba(255,255,255,0.2)', border: 'none',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer', backdropFilter: 'blur(10px)',
          }}>
            <Icon name="chevronL" size={20} color="#fff" weight={2.2} />
          </button>
          <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600,
            letterSpacing: 1.2, textTransform: 'uppercase', opacity: 0.9 }}>
            {type.label}
          </div>
          <button style={{
            width: 40, height: 40, borderRadius: 20,
            background: 'rgba(255,255,255,0.2)', border: 'none',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer',
          }}>
            <Icon name="more" size={20} color="#fff" />
          </button>
        </div>

        <div style={{ fontFamily: SoS.sans, fontSize: 13, opacity: 0.85, marginBottom: 4 }}>
          {formatDate(appt.date, { long: true })} · kl. {appt.start}–{appt.end}
        </div>
        <div style={{ fontFamily: SoS.font, fontSize: 30, fontWeight: 400,
          lineHeight: 1.1, letterSpacing: -0.4 }}>
          {appt.activity}
        </div>
      </div>

      {/* Menneske card */}
      <div style={{ margin: '-20px 16px 16px', background: '#fff',
        borderRadius: SoS.r.xl, padding: 20, boxShadow: SoS.shadow.md,
        position: 'relative', zIndex: 1 }}>

        <div style={{ display: 'flex', justifyContent: 'space-between',
          alignItems: 'center', marginBottom: 14 }}>
          <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
            color: SoS.inkMuted, letterSpacing: 1, textTransform: 'uppercase' }}>Menneske</div>
          <SecuritySeal />
        </div>

        <div style={{ display: 'flex', gap: 14, alignItems: 'center', marginBottom: 18 }}>
          <Avatar initials={menneske.initials} bg={type.color} size={56} />
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: SoS.font, fontSize: 24, fontWeight: 500,
              color: SoS.ink, letterSpacing: -0.2, marginBottom: 2 }}>
              {revealed ? `${menneske.firstName} ${menneske.lastName}` : menneske.firstName}
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>
              {menneske.age} år · {menneske.language}
            </div>
          </div>
        </div>

        {!revealed ? (
          <button onClick={() => setRevealed(true)} style={{
            width: '100%', padding: 14, borderRadius: SoS.r.md,
            background: SoS.creamDeep, border: `1px dashed ${SoS.orange}66`,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            cursor: 'pointer',
          }}>
            <Icon name="lock" size={16} color={SoS.orangeDeep} weight={2.2} />
            <span style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, color: SoS.orangeDeep }}>
              Vis fulde oplysninger
            </span>
          </button>
        ) : (
          <>
            <InfoRow icon="pin" label="Mødested" value={
              <div>
                <div>{menneske.address}</div>
                <div style={{ fontSize: 12, color: SoS.inkSoft, marginTop: 4 }}>{menneske.meetPoint}</div>
              </div>
            } action={<Icon name="pin" size={16} color={SoS.orange} />} multiline />
            <InfoRow icon="language" label="Sprog" value={menneske.language} />
            <InfoRow icon="heart" label="Behov" multiline value={
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 4 }}>
                {menneske.needs.map((n, i) => <Pill key={i} bg={type.soft} color={type.color}>{n}</Pill>)}
              </div>
            } />
            {menneske.health && (() => {
              // Check if appointment is within the data-access window (default ±7 days)
              const apptDate = new Date(appt.date);
              const today = new Date('2026-04-25');
              const diffDays = (apptDate - today) / (1000 * 60 * 60 * 24);
              const hasAccess = diffDays >= -7 && diffDays <= 7;
              return hasAccess ? (
                <InfoRow icon="shield" label="Helbred & hensyn" value={menneske.health} multiline />
              ) : (
                <div style={{
                  display: 'flex', gap: 12, alignItems: 'flex-start',
                  padding: '12px 0', borderBottom: `1px solid ${SoS.lineSoft}`,
                }}>
                  <div style={{ width: 32, height: 32, borderRadius: 16,
                    background: SoS.lineSoft, flexShrink: 0,
                    display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Icon name="lock" size={14} color={SoS.inkMuted}/>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600,
                      color: SoS.inkMuted, marginBottom: 3 }}>Helbred & hensyn</div>
                    <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkMuted,
                      lineHeight: 1.4 }}>
                      Adgang låst — følsomme oplysninger er kun synlige
                      7 dage før og efter brobygningen.
                    </div>
                  </div>
                </div>
              );
            })()}
              {revealed && (
                menneske.mobilOptOut
                  ? <InfoRow icon="phone" label="Mobilkontakt" value={
                      <span style={{ color: SoS.inkMuted, fontStyle: 'italic' }}>
                        Borgeren ønsker ikke mobilkontakt – kontakt via koordinator
                      </span>
                    } />
                  : menneske.mobil
                    ? <InfoRow icon="phone" label="Mobil (borger)" value={menneske.mobil}
                        action={<Icon name="phone" size={16} color={SoS.orange} />} />
                    : <InfoRow icon="phone" label="Mobil (borger)" value={
                        <span style={{ color: SoS.rose, fontStyle: 'italic' }}>Ikke registreret</span>
                      } />
              )}
              {revealed && (
                menneske.mobilOptOut
                  ? <InfoRow icon="phone" label="Mobilkontakt" value={
                      <span style={{ color: SoS.inkMuted, fontStyle: 'italic' }}>
                        Borgeren ønsker ikke mobilkontakt – kontakt via koordinator
                      </span>
                    } />
                  : menneske.mobil
                    ? <InfoRow icon="phone" label="Mobil (borger)" value={menneske.mobil}
                        action={<Icon name="phone" size={16} color={SoS.orange} />} />
                    : <InfoRow icon="phone" label="Mobil (borger)" value={
                        <span style={{ color: SoS.rose, fontStyle: 'italic' }}>Ikke registreret</span>
                      } />
              )}
            <InfoRow icon="phone" label="Koordinator"
              value={<div>
                <div>{menneske.contact.name}</div>
                <div style={{ fontSize: 12, color: SoS.inkSoft, marginTop: 2 }}>{menneske.contact.role}</div>
              </div>}
              action={<Icon name="phone" size={16} color={SoS.orange} />} multiline
            />
          </>
        )}
      </div>

      {/* Brobygningsstige */}
      <div style={{ padding: '0 16px 16px' }}>
        <SectionHead title="Fremskridt" />
        <BrobygningsStige menneske={menneske} compact={true} />
      </div>

      {/* Tidligere noter */}
      {revealed && menneske.notes.length > 0 && (
        <div style={{ padding: '0 20px 20px' }}>
          <SectionHead title="Tidligere noter" />
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {menneske.notes.map((n, i) => (
              <div key={i} style={{
                background: '#fff', borderRadius: SoS.r.md, padding: 14,
                border: `1px solid ${SoS.lineSoft}`,
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between',
                  marginBottom: 6 }}>
                  <span style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600, color: SoS.ink }}>
                    {n.from}
                  </span>
                  <span style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkMuted }}>
                    {n.date}
                  </span>
                </div>
                <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
                  lineHeight: 1.5 }}>{n.text}</div>
              </div>
            ))}
          </div>
        </div>
      )}


      {/* Kalender-download */}
      <div style={{ padding: '0 20px 4px' }}>
        <button onClick={downloadICS} style={{
          width: '100%', padding: '13px 0',
          background: '#fff', border: `1px solid ${SoS.line}`,
          borderRadius: SoS.r.md, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink,
        }}>
          <Icon name="calendar" size={16} color={SoS.sky} weight={2}/>
          Gem i kalender (.ics)
        </button>
        <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkMuted,
          textAlign: 'center', marginTop: 6 }}>
          Åbner i Outlook, Apple Kalender og Google Kalender
        </div>
      </div>

      {/* Actions */}
      <div style={{ padding: '0 20px 30px', display: 'flex',
        flexDirection: 'column', gap: 10 }}>
        {isToday(appt.date) ? (
          <Button full onClick={onComplete}
            icon={<Icon name="check" size={18} color="#fff" weight={2.5} />}>
            Registrér efter aftale
          </Button>
        ) : (
          <>
            <Button full variant="secondary"
              onClick={() => alert(`Ring ${menneske.contact.name}: ${menneske.contact.phone}`)}
              icon={<Icon name="phone" size={16} color={SoS.ink} weight={2} />}>
              Ring koordinator: {menneske.contact.phone}
            </Button>
            <Button full variant="ghost"
              onClick={() => setShowCancel(true)}
              icon={<Icon name="x" size={16} color={SoS.rose} weight={2.2} />}
              style={{ color: SoS.rose }}>
              Aflys aftale
            </Button>
          </>
        )}
      </div>
      {showCancel && !cancelled && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)',
          display: 'flex', alignItems: 'flex-end', zIndex: 999 }}>
          <div style={{ width: '100%', background: '#fff', borderRadius: '20px 20px 0 0',
            padding: '24px 20px 40px' }}>
            <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500,
              color: SoS.ink, marginBottom: 8 }}>Aflys aftale?</div>
            <div style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.inkSoft,
              lineHeight: 1.5, marginBottom: 24 }}>
              Din koordinator bliver informeret. Aftalen fjernes fra din kalender.
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <Button full variant="secondary" onClick={() => setShowCancel(false)}>
                Behold aftale
              </Button>
              <Button full onClick={() => { setCancelled(true); setShowCancel(false); }}
                style={{ background: SoS.rose, color: '#fff' }}>
                Bekræft aflysning
              </Button>
            </div>
          </div>
        </div>
      )}
      {cancelled && (
        <div style={{ position: 'absolute', inset: 0, background: SoS.cream,

<!-- screens-misc -->
<script type="text/babel">
// Historik + Notifikationer + Profil — brobygger

const HistorikScreen = ({ history, onOpenMenneske }) => {
  // Group by month
  const grouped = {};
  history.forEach(h => {
    const d = new Date(h.date);
    const key = `${['Januar','Februar','Marts','April','Maj','Juni','Juli','August','September','Oktober','November','December'][d.getMonth()]} ${d.getFullYear()}`;
    (grouped[key] ||= []).push(h);
  });

  const totals = {
    appts: history.length,
    hours: history.reduce((s, h) => {
      const parts = h.duration.match(/(\d+)t(?:\s+(\d+)m)?|(\d+)m/);
      if (!parts) return s;
      return s + (parseInt(parts[1]||0) || 0) + (parseInt(parts[2]||0) || 0)/60 + (parseInt(parts[3]||0) || 0)/60;
    }, 0).toFixed(1),
    mennesker: new Set(history.map(h => h.menneskeId)).size,
  };

  return (
    <>
      <TopBar title="Historik" subtitle="Gennemførte aftaler" />

      {/* Summary */}
      <div style={{ margin: '0 20px 20px', padding: 20, borderRadius: SoS.r.xl,
        background: `linear-gradient(135deg, ${SoS.cream} 0%, ${SoS.creamDeep} 100%)`,
        border: `1px solid ${SoS.lineSoft}` }}>
        <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600,
          color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 12 }}>
          Siden du startede
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16 }}>
          <div>
            <div style={{ fontFamily: SoS.font, fontSize: 32, fontWeight: 500,
              color: SoS.orange, lineHeight: 1 }}>{totals.appts}</div>
            <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, marginTop: 4 }}>Aftaler</div>
          </div>
          <div>
            <div style={{ fontFamily: SoS.font, fontSize: 32, fontWeight: 500,
              color: SoS.sage, lineHeight: 1 }}>{totals.hours}</div>
            <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, marginTop: 4 }}>Timer</div>
          </div>
          <div>
            <div style={{ fontFamily: SoS.font, fontSize: 32, fontWeight: 500,
              color: SoS.sky, lineHeight: 1 }}>{totals.mennesker}</div>
            <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, marginTop: 4 }}>Mennesker</div>
          </div>
        </div>
      </div>

      {/* Timeline */}
      {Object.entries(grouped).map(([month, items]) => (
        <div key={month} style={{ padding: '0 20px 20px' }}>
          <SectionHead title={month} />
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {items.map(h => {
              const menneske = SoS_MENNESKER[h.menneskeId];
              const type = SoS_TYPER[menneske.type];
              return (
                <div key={h.id} onClick={() => onOpenMenneske(h.menneskeId)} style={{
                  display: 'flex', gap: 12, padding: 14, background: '#fff',
                  borderRadius: SoS.r.md, cursor: 'pointer',
                  border: `1px solid ${SoS.lineSoft}`,
                }}>
                  <Avatar initials={menneske.initials} bg={type.color} size={44} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 2 }}>
                      <span style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink }}>
                        {menneske.firstName}
                      </span>
                      <span style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkMuted }}>
                        {formatDate(h.date, { short: true })}
                      </span>
                    </div>
                    <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
                      overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      {h.activity}
                    </div>
                    <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
                      <Pill bg={type.soft} color={type.color}>{type.short}</Pill>
                      <Pill bg={SoS.creamDeep} color={SoS.inkSoft}>{h.duration}</Pill>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </>
  );
};

          color: SoS.inkSoft, lineHeight: 1.5 }}>

        </div>

  return (
  <>
    <TopBar title="Profil" />
    <div style={{ padding: '0 20px 100px' }}>
      <div style={{ display: 'flex', gap: 16, alignItems: 'center',

      </div>

      <div style={{ background: '#fff', borderRadius: SoS.r.lg,
        border: `1px solid ${SoS.lineSoft}`, overflow: 'hidden', marginBottom: 20 }}>
        {[
          { icon: 'user',     label: 'Personlige oplysninger', key: 'personlig' },
          { icon: 'heart',    label: 'Mine præferencer',       key: 'praeferencer' },
          { icon: 'shield',   label: 'Privatliv & sikkerhed',  key: 'privatliv' },
          { icon: 'bell',     label: 'Notifikationer',         key: 'notif' },
        ].map((row, i, arr) => (
          <div key={i} onClick={() => setSubPage(row.key)} style={{

};

Object.assign(window, { HistorikScreen, NotifScreen, ProfileScreen });

<script type="text/babel">

// ─── Step indicator ───
const StepDots = ({ step, total, color = SoS.orange }) => (

);

// ═══════════════════════════════════════════════════════════

                  <button key={r} onClick={() => set('endReason', r)} style={{
                    display: 'block', width: '100%', padding: '14px 16px',

        >
          {step === steps.length - 1 ? 'Indsend' : 'Fortsæt'}
        </Button>
      </div>
    </div>
  );
};

window.StepDots = StepDots;
window.RegistrerEfterAftale = RegistrerEfterAftale;
</script>
