            {/* Monthly trend */}
            <div style={{ background: '#fff', borderRadius: SoS.r.lg, padding: 16,
              border: `1px solid ${SoS.lineSoft}`, marginBottom: 12 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase',
                marginBottom: 14 }}>Gennemførte aftaler — 12 mdr</div>
              <div style={{ display: 'flex', alignItems: 'flex-end',
                gap: 4, height: 100 }}>
                {REPORT_DATA.monthlyCompleted.map((v, i) => {
                  const max = Math.max(...REPORT_DATA.monthlyCompleted);
                  return (
                    <div key={i} style={{ flex: 1,
                      height: `${(v / max) * 100}%`,
                      background: i >= 9 ? SoS.orange : SoS.orangeSoft,
                      borderRadius: '3px 3px 0 0',
                      position: 'relative',
                    }}/>
                  );
                })}
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between',
                marginTop: 6, fontFamily: SoS.sans, fontSize: 9, color: SoS.inkMuted }}>
                <span>Maj '25</span><span>Okt</span><span>Apr '26</span>
              </div>
            </div>

            {/* CTA row */}
            <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
              <Button variant="secondary" style={{ flex: 1 }}
                onClick={handleShare}
                icon={shared ? <Icon name="check" size={16} color={SoS.ink} weight={2.3}/> : undefined}>
                {shared ? 'Delt!' : 'Del rapport'}
              </Button>
              <Button style={{ flex: 1 }} onClick={handleExport}
                icon={<Icon name={exported ? 'check' : 'download'} size={16} color="#fff" weight={2.3}/>}>
                {exported ? 'Eksporteret!' : 'Eksportér PDF'}
              </Button>
            </div>
          </div>
        ) : (
          // Configure tab
          <div style={{ padding: 16 }}>
            <div style={{ background: '#fff', borderRadius: SoS.r.lg, padding: 16,
              border: `1px solid ${SoS.lineSoft}`, marginBottom: 12 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase',
                marginBottom: 10 }}>Periode</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr',
                gap: 8 }}>
                {['Sidste måned', 'Kvartal', 'Jan–apr 2026', 'Hele året'].map((p, i) => (
                  <button key={p} style={{
                    padding: '12px', borderRadius: SoS.r.md, textAlign: 'center',
                    background: i === 2 ? SoS.orange : SoS.creamDeep,
                    color: i === 2 ? '#fff' : SoS.ink,
                    border: 'none', cursor: 'pointer',
                    fontFamily: SoS.sans, fontSize: 13, fontWeight: 500,
                  }}>{p}</button>
                ))}
              </div>
            </div>

            <div style={{ background: '#fff', borderRadius: SoS.r.lg, padding: 16,
              border: `1px solid ${SoS.lineSoft}`, marginBottom: 12 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase',
                marginBottom: 10 }}>Inkludér typer</div>
              {Object.entries(SROI_RATES).map(([k, r]) => (
                <label key={k} style={{ display: 'flex', alignItems: 'center',
                  gap: 10, padding: '10px 0',
                  borderBottom: `1px solid ${SoS.lineSoft}`, cursor: 'pointer' }}>
                  <input type="checkbox" defaultChecked style={{
                    width: 18, height: 18, accentColor: SoS.orange,
                  }}/>
                  <div style={{ width: 8, height: 8, borderRadius: 4, background: r.color }}/>
                  <span style={{ flex: 1, fontFamily: SoS.sans, fontSize: 14, color: SoS.ink }}>
                    {r.label}
                  </span>
                  <span style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkMuted }}>
                    {r.perMeeting} kr/møde
                  </span>
                </label>
              ))}
            </div>

            <div style={{ background: '#fff', borderRadius: SoS.r.lg, padding: 16,
              border: `1px solid ${SoS.lineSoft}`, marginBottom: 12 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase',
                marginBottom: 10 }}>Format</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr',
                gap: 8 }}>
                {[
                  { k: 'pdf', l: 'PDF', icon: 'note' },
                  { k: 'csv', l: 'CSV', icon: 'chart' },
                  { k: 'xlsx', l: 'Excel', icon: 'chart' },
                ].map(f => (
                  <button key={f.k} onClick={() => setFormat(f.k)} style={{
                    padding: '14px 8px', borderRadius: SoS.r.md, textAlign: 'center',
                    background: format === f.k ? SoS.orange + '15' : '#fff',
                    border: `2px solid ${format === f.k ? SoS.orange : SoS.lineSoft}`,
                    cursor: 'pointer', fontFamily: SoS.sans, fontSize: 13,
                    fontWeight: 500, color: format === f.k ? SoS.orange : SoS.ink,
                    display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                  }}>
                    <Icon name={f.icon} size={22} color={format === f.k ? SoS.orange : SoS.inkMuted}/>
                    {f.l}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ background: '#fff', borderRadius: SoS.r.lg, padding: 16,
              border: `1px solid ${SoS.lineSoft}`, marginBottom: 16 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase',
                marginBottom: 10 }}>Vedhæft</div>
              {[
                { l: 'Metodologi-bilag', sub: 'Forklaring af SROI-beregning', on: true },
                { l: 'Kilder (VIVE, Rambøll)', sub: 'Referencer og antagelser', on: true },
                { l: 'Anonymiseret case-liste', sub: 'Eksempler på menneskenes forløb', on: false },
                { l: 'Kvalitative citater', sub: 'Fra aftale-noter (anonymiseret)', on: true },
              ].map((a, i) => (
                <label key={i} style={{ display: 'flex', alignItems: 'center',
                  gap: 10, padding: '10px 0',
                  borderBottom: i < 3 ? `1px solid ${SoS.lineSoft}` : 'none',
                  cursor: 'pointer' }}>
                  <input type="checkbox" defaultChecked={a.on} style={{
                    width: 18, height: 18, accentColor: SoS.orange,
                  }}/>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.ink,
                      fontWeight: 500 }}>{a.l}</div>
                    <div style={{ fontFamily: SoS.sans, fontSize: 11,
                      color: SoS.inkMuted, marginTop: 1 }}>{a.sub}</div>
                  </div>
                </label>
              ))}
            </div>

            <Button full onClick={() => setView('preview')}>
              Generér rapport
            </Button>
          </div>
        )}
      </div>
    </div>
  );
};

window.ExportReport = ExportReport;
</script>

<!-- admin-overview -->
<script type="text/babel">
// Admin screens — mobile data-rich dashboard for ansatte

const AdminTopBar = ({ title, subtitle, hovedsaede, onSwitchHq, isAdmin = false }) => (
  <div style={{
    position: 'sticky', top: 0, background: SoS.ink, zIndex: 20,
    padding: '54px 20px 18px', color: '#fff',
    borderBottomLeftRadius: 20, borderBottomRightRadius: 20,
  }}>
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <div>
        {subtitle && <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 600,
          letterSpacing: 1, textTransform: 'uppercase', opacity: 0.6, marginBottom: 4 }}>{subtitle}</div>}
        <div style={{ fontFamily: SoS.font, fontSize: 24, fontWeight: 500, letterSpacing: -0.2 }}>{title}</div>
      </div>
      <button onClick={onSwitchHq} style={{
        padding: '8px 14px', borderRadius: 999,
        background: isAdmin ? SoS.orange : 'rgba(255,255,255,0.12)',
        border: isAdmin ? 'none' : '1px solid rgba(255,255,255,0.2)', color: '#fff',
        fontFamily: SoS.sans, fontSize: 12, fontWeight: 600, cursor: 'pointer',
        display: 'flex', alignItems: 'center', gap: 6,
      }}>
        {isAdmin
          ? <><Icon name="sparkle" size={12} color="#fff" weight={2.2}/> Admin</>
          : <><div style={{ width: 8, height: 8, borderRadius: 4, background: SoS.hq[hovedsaede] || SoS.orange }} />{hovedsaede}<Icon name="chevronD" size={14} color="#fff" /></>}
      </button>
    </div>
  </div>
);

const AdminTabBar = ({ active, onChange }) => {
  const tabs = [
    { id: 'overview', label: 'Oversigt', icon: 'chart' },
    { id: 'brobyggere', label: 'Brobyggere', icon: 'users' },
    { id: 'mennesker', label: 'Mennesker', icon: 'heart' },
    { id: 'rapport', label: 'Rapport', icon: 'note' },
    { id: 'profil', label: 'Mig', icon: 'user' },
  ];
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      background: 'rgba(255,255,255,0.95)',
      backdropFilter: 'blur(20px) saturate(180%)',
      WebkitBackdropFilter: 'blur(20px) saturate(180%)',
      borderTop: `1px solid ${SoS.line}`,
      paddingBottom: 28, paddingTop: 10,
      display: 'flex', justifyContent: 'space-around', zIndex: 50,
    }}>
      {tabs.map(t => {
        const on = active === t.id;
        return (
          <button key={t.id} onClick={() => onChange(t.id)} style={{
            background: 'none', border: 'none', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
            padding: '4px 6px', color: on ? SoS.orange : SoS.inkMuted,
          }}>
            <Icon name={t.icon} size={22} color={on ? SoS.orange : SoS.inkMuted} weight={on ? 2.1 : 1.7} />
            <div style={{ fontFamily: SoS.sans, fontSize: 10, fontWeight: 600 }}>{t.label}</div>
          </button>
        );
      })}
    </div>
  );
};

const RingTaskCard = ({ task: t, onDone }) => {
  const [checked, setChecked] = React.useState(false);
  const fmtDato = (d) => d ? new Date(d).toLocaleDateString('da-DK',
    { weekday: 'short', day: 'numeric', month: 'short' }) : '';
  const handleCheck = () => {
    setChecked(true);
    setTimeout(onDone, 600);
  };
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0',
      borderTop: `1px solid ${SoS.orange}22`,
      opacity: checked ? 0.4 : 1, transition: 'opacity 0.4s' }}>
      <button onClick={handleCheck} style={{ width: 24, height: 24, borderRadius: 12,
        flexShrink: 0, border: `2px solid ${checked ? SoS.sage : SoS.orange}`,
        background: checked ? SoS.sage : 'transparent', cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {checked && <Icon name='check' size={12} color='#fff' weight={2.5}/>}
      </button>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,
          color: SoS.ink, marginBottom: 2 }}>
          Ring {t.menneskeFirstName} {t.menneskeLastInitial}.
        </div>
        <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>
          Aftale med {t.brobyggerFirstName} · {fmtDato(t.dato)} kl. {t.start}
        </div>
      </div>
      <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 700,
        color: SoS.ink }}>{t.menneskeContact?.phone}</div>
    </div>
  );
};

// Overview — the data analyst's dashboard
const AdminOverview = ({ hovedsaede }) => {
  const weeklyMatches = [
    { l: 'M', v: 8 }, { l: 'T', v: 12 }, { l: 'O', v: 9 }, { l: 'T', v: 15 },
    { l: 'F', v: 14 }, { l: 'L', v: 6 }, { l: 'S', v: 3 },
  ];
  const monthlyTrend = [34, 38, 42, 47, 51, 55, 62, 68, 71, 78, 85, 94];

  return (
    <>
      {/* Period selector */}
      <div style={{ padding: '16px 20px 12px', display: 'flex', gap: 6,
        overflowX: 'auto' }}>
        {['I dag', 'Uge', 'Måned', 'Kvartal', 'År', 'Alt'].map((p, i) => (
          <button key={p} style={{
            padding: '8px 14px', borderRadius: 999, flexShrink: 0,
            background: i === 2 ? SoS.ink : '#fff',
            color: i === 2 ? '#fff' : SoS.ink,
            border: i === 2 ? 'none' : `1px solid ${SoS.line}`,
            fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>{p}</button>
        ))}
      </div>

      {/* Ring og bekraft — ventende opgaver */}
      {(() => {
        const tasks = (window.PENDING_RING_TASKS || []).filter(t => !t.done);
        if (tasks.length === 0) return null;
        return (
          <div style={{ margin: '0 20px 16px', padding: 16,
            background: SoS.orange + '10', borderRadius: SoS.r.lg,
            border: `1.5px solid ${SoS.orange}33` }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
              <Icon name='phone' size={16} color={SoS.orange}/>
              <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 700,
                color: SoS.orange, textTransform: 'uppercase', letterSpacing: 0.8 }}>
                Ring og bekraft — {tasks.length} ventende
              </div>
            </div>
            {tasks.map(t => (
              <RingTaskCard key={t.id} task={t}
                onDone={() => { t.done = true; }}/>
            ))}
          </div>
        );
      })()}


      {/* Headline KPIs */}
      <div style={{ padding: '0 20px 12px', display: 'grid',
        gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        <KPI label="Aktive mennesker" value="94" delta="+12%" color={SoS.orange}
          sparkData={monthlyTrend} />
        <KPI label="Aktive brobyggere" value="47" delta="+4" color={SoS.sage}
          sparkData={[31,33,35,34,38,40,42,43,44,46,45,47]} />
        <KPI label="Gennemf. aftaler" value="186" delta="+23%" color={SoS.sky}
          subtitle="Denne måned" />
        <KPI label="Timer doneret" value="412" delta="+18%" color={SoS.orangeDeep}
          subtitle="Siden 1. april" />
      </div>

      {/* Fordeling på typer */}
      <div style={{ margin: '12px 20px 16px', padding: 18, background: '#fff',
        borderRadius: SoS.r.lg, border: `1px solid ${SoS.lineSoft}` }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
          marginBottom: 14 }}>
          <div style={{ fontFamily: SoS.font, fontSize: 17, fontWeight: 500, color: SoS.ink }}>
            Fordeling på typer
          </div>
          <span style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>Aktive forløb</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
          <TypeDonut sundhed={22} forening={31} social={41} size={130} />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 12 }}>
            {[
              { key: 'sundhed', v: 22, pct: 24 },
              { key: 'forening', v: 31, pct: 33 },
              { key: 'social', v: 41, pct: 43 },
            ].map(item => {
              const t = SoS_TYPER[item.key];
              return (
                <div key={item.key}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                    <div style={{ width: 10, height: 10, borderRadius: 5, background: t.color }} />
                    <span style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600, color: SoS.ink, flex: 1 }}>
                      {t.short}
                    </span>
                    <span style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft }}>{item.v}</span>
                  </div>
                  <div style={{ height: 4, background: SoS.lineSoft, borderRadius: 2, overflow: 'hidden' }}>
                    <div style={{ width: `${item.pct}%`, height: '100%', background: t.color }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Ugens matches */}
      <div style={{ margin: '0 20px 16px', padding: 18, background: '#fff',
        borderRadius: SoS.r.lg, border: `1px solid ${SoS.lineSoft}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 14 }}>
          <div style={{ fontFamily: SoS.font, fontSize: 17, fontWeight: 500 }}>Aftaler pr. dag</div>
          <span style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>Uge 17</span>
        </div>
        <MiniBars data={weeklyMatches} color={SoS.orange} height={90}/>
      </div>

      {/* Kvalitet & status */}
      <div style={{ padding: '0 20px', marginBottom: 12 }}>
        <SectionHead title="Kvalitet" />
      </div>
      <div style={{ padding: '0 20px 16px', display: 'grid',
        gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        <KPI label="Gennemført-rate" value="91%" delta="+2%" subtitle="Bookede aftaler" color={SoS.sage}/>
        <KPI label="Aflysnings-rate" value="9%" delta="−2%" subtitle="Menneske + brobygger" color={SoS.rose}/>
        <KPI label="Ventetid til match" value="5.2d" delta="−1.1d" subtitle="Medianen" color={SoS.sky}/>

      </div>

      {/* Status fordeling */}
      <div style={{ margin: '0 20px 16px', padding: 18, background: '#fff',
        borderRadius: SoS.r.lg, border: `1px solid ${SoS.lineSoft}` }}>
        <div style={{ fontFamily: SoS.font, fontSize: 17, fontWeight: 500, marginBottom: 12 }}>
          Status på forløb
        </div>
        <StackedBar height={14} segments={[
          { v: 68, color: SoS.sage },
          { v: 12, color: SoS.sun },
          { v: 28, color: SoS.inkMuted },
        ]} />
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 14, gap: 8 }}>
          {[
            { color: SoS.sage, label: 'Aktiv', v: 68 },
            { color: SoS.sun, label: 'Pause', v: 12 },
            { color: SoS.inkMuted, label: 'Afsluttet i år', v: 28 },
          ].map((s, i) => (
            <div key={i} style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 2 }}>
                <div style={{ width: 8, height: 8, borderRadius: 4, background: s.color }}/>
                <span style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>{s.label}</span>
              </div>
              <div style={{ fontFamily: SoS.font, fontSize: 20, fontWeight: 500, color: SoS.ink }}>{s.v}</div>
            </div>
          ))}
        </div>

<!-- admin-screens -->
<script type="text/babel">
// Admin — remaining screens (brobyggere list, mennesker, rapport, profil)

const BrobyggerProfilePanel = ({ brobygger: b, onClose }) => {
  const [status, setStatus] = React.useState(b.status);
  const [startDate, setStartDate] = React.useState(b.startDate || '');
  const [showEndConfirm, setShowEndConfirm] = React.useState(false);
  const [ended, setEnded] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [pauseUntil, setPauseUntil] = React.useState(b.pauseUntil || '');
  const [pauseNote, setPauseNote] = React.useState(b.pauseNote || '');
  const [pauseSaved, setPauseSaved] = React.useState(false);

  // Synk status-ændringer tilbage til det globale array og localStorage
  React.useEffect(() => {
    if (!window.SoS_BROBYGGERE) return;
    const updated = window.SoS_BROBYGGERE.map(bb =>
      bb.id === b.id ? { ...bb, status, pauseUntil, pauseNote } : bb
    );
    window.SoS_BROBYGGERE = updated;
    window.SoS_STORE?.save('brobyggere', updated);
  }, [status, pauseUntil, pauseNote]);

  const today = new Date('2026-04-25');
  const fmtDate = (d) => d ? new Date(d).toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' }) : null;
  const monthsActive = b.startDate
    ? Math.round((today - new Date(b.startDate)) / (1000 * 60 * 60 * 24 * 30.4) * 10) / 10
    : null;

  const STATUS_COLORS = {
    aktiv: { bg: SoS.sageSoft, color: SoS.sage, label: 'Aktiv' },
    pause: { bg: SoS.sun + '22', color: SoS.orangeDeep, label: 'På pause' },
    ny:    { bg: SoS.skySoft, color: SoS.sky, label: 'Ny' },
    afventer: { bg: SoS.orange + '15', color: SoS.orange, label: 'Afventer godkendelse' },
    afsluttet: { bg: '#F5F5F5', color: SoS.inkMuted, label: 'Afsluttet' },
  };
  const sc = STATUS_COLORS[status] || STATUS_COLORS.aktiv;

  if (ended) {
    return (
      <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)',
        zIndex: 500, display: 'flex', alignItems: 'flex-end' }}>

          width: '100%', textAlign: 'center' }}>
          <div style={{ width: 56, height: 56, borderRadius: 28, background: SoS.sageSoft,
            display: 'flex', alignItems: 'center', justifyContent: 'center',

            <Icon name="check" size={24} color={SoS.sage}/>

          <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500, color: SoS.ink, marginBottom: 8 }}>

          <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft, lineHeight: 1.5, marginBottom: 24 }}>

          </div>
          <button onClick={onClose} style={{
            width: '100%', padding: '14px 0', background: SoS.orange, color: '#fff',
            border: 'none', borderRadius: SoS.r.md, fontFamily: SoS.sans,
            fontSize: 15, fontWeight: 600, cursor: 'pointer',
          }}>Luk</button>
        </div>
      </div>
    );
  }

    <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.45)',

        <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '8px 16px 0' }}>

            width: 32, height: 32, borderRadius: 16, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="close" size={14} color={SoS.ink}/>

        </div>

        {/* Profile header */}
        <div style={{ padding: '8px 20px 20px', display: 'flex', gap: 16, alignItems: 'center' }}>

            background: status === 'afventer' ? SoS.lineSoft : b.bg,

          </div>

            <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500,
              color: SoS.ink, letterSpacing: -0.2 }}>{b.name}</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 6 }}>
              <span style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 700,
                color: sc.color, background: sc.bg,
                padding: '3px 10px', borderRadius: 999 }}>{sc.label}</span>
              {monthsActive && (
                <span style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>
                  {monthsActive} måneder
                </span>
              )}

          </div>
        </div>

        {/* Afventer — godkend / afvis */}
        {status === 'afventer' && (
          <div style={{ margin: '0 16px 16px', background: SoS.orange + '12',
            border: `1.5px solid ${SoS.orange}40`, borderRadius: SoS.r.md, padding: 16 }}>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,
              color: SoS.orange, marginBottom: 8 }}>
              Afventer godkendelse
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft,
              marginBottom: 14, lineHeight: 1.5 }}>
              Denne brobygger har gennemført onboarding og venter på at blive aktiveret.
              Sæt en startdato og godkend for at give adgang.
            </div>
                {/* Kontaktoplysninger */}
                <div style={{ marginTop: 12, padding: '12px 16px', background: SoS.cream,
                  borderRadius: SoS.r.md }}>
                  <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                    color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 8 }}>
                    Kontakt
                  </div>
                  {b.mobil ? (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                      <Icon name="phone" size={16} color={SoS.orange}/>
                      <span style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.ink }}>{b.mobil}</span>
                    </div>
                  ) : (
                    <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.rose, marginBottom: 6 }}>
                      ⚠ Mobilnummer mangler
                    </div>
                  )}
                  {b.email && (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <Icon name="note" size={16} color={SoS.orange}/>
                      <span style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>{b.email}</span>
                    </div>
                  )}
                </div>
                {/* Kontaktoplysninger */}
                <div style={{ marginTop: 12, padding: '12px 16px', background: SoS.cream,
                  borderRadius: SoS.r.md }}>
                  <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                    color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 8 }}>
                    Kontakt
                  </div>
                  {b.mobil ? (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                      <Icon name="phone" size={16} color={SoS.orange}/>
                      <span style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.ink }}>{b.mobil}</span>
                    </div>
                  ) : (
                    <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.rose, marginBottom: 6 }}>
                      ⚠ Mobilnummer mangler
                    </div>
                  )}
                  {b.email && (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <Icon name="note" size={16} color={SoS.orange}/>
                      <span style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>{b.email}</span>
                    </div>
                  )}
                </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 600,

              <input type="date" value={startDate}
                onChange={e => setStartDate(e.target.value)}
                style={{ width: '100%', padding: '10px 12px', fontFamily: SoS.sans,
                  fontSize: 14, color: SoS.ink, background: '#fff',
                  border: `1.5px solid ${SoS.lineSoft}`, borderRadius: SoS.r.md,
                  outline: 'none', boxSizing: 'border-box' }}/>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => { setStatus('aktiv'); setSaved(true); setTimeout(() => setSaved(false), 1500); }}
                style={{ flex: 2, padding: '12px 0', background: SoS.sage, color: '#fff',
                  border: 'none', borderRadius: SoS.r.md, fontFamily: SoS.sans,
                  fontSize: 14, fontWeight: 600, cursor: 'pointer' }}>
                {saved ? '✓ Godkendt' : 'Godkend og aktivér'}
              </button>
              <button onClick={() => setStatus('afsluttet')} style={{
                flex: 1, padding: '12px 0', background: '#fff', color: SoS.inkSoft,
                border: `1px solid ${SoS.lineSoft}`, borderRadius: SoS.r.md,
                fontFamily: SoS.sans, fontSize: 14, cursor: 'pointer',
              }}>Afvis</button>
            </div>
          </div>
        )}

        {/* Stats grid */}
        {status !== 'afventer' && (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr',
            gap: 8, margin: '0 16px 16px' }}>

              { label: 'Aktive forløb', value: b.active },
              { label: 'Denne måned', value: b.thisMonth },
              { label: 'Ledige vagter', value: b.openShifts },

                <div style={{ fontFamily: SoS.sans, fontSize: 10, color: SoS.inkSoft,
                  marginTop: 2, lineHeight: 1.3 }}>{s.label}</div>

              color: SoS.inkMuted, letterSpacing: 0.8, textTransform: 'uppercase',
              marginBottom: 12 }}>Planlagt pause</div>
            {pauseUntil && pauseUntil >= '2026-04-26' ? (
              <>

                    <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, color: SoS.ink }}>

                      <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, marginTop: 2 }}>

                        outline: 'none', boxSizing: 'border-box' }}/>
                  </div>

                  onClick={() => { if (pauseUntil) { setPauseSaved(true); setTimeout(() => setPauseSaved(false), 2000); } }}

                    color: pauseUntil ? '#fff' : SoS.inkMuted,
                    border: 'none', borderRadius: SoS.r.md,
                    fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,

                </button>
              </>
            )}
          </div>
        )}

        {/* Status actions */}
        {status !== 'afventer' && (
          <div style={{ padding: '0 16px' }}>
            {status === 'aktiv' && (
              <button onClick={() => setStatus('pause')} style={{
                width: '100%', padding: '13px 0', marginBottom: 8,
                background: '#fff', color: SoS.ink,

                width: '100%', padding: '13px 0', marginBottom: 8,

                    flex: 1, padding: '11px 0', background: '#fff', color: SoS.inkSoft,

              </div>

  'telefonisk':      { label: 'Telefonisk kontakt',           shortLabel: 'Tlf.',     color: '#6B8CAE' },
  'mode-brobygger':  { label: 'Møde med brobygger',          shortLabel: 'Møde',    color: '#7FA089' },
  'folge-primaer':   { label: 'Følgeskab – primær sundhed',  shortLabel: 'Primær',  color: '#E87A3E' },
  'folge-sekundaer': { label: 'Følgeskab – sekundær sundhed', shortLabel: 'Sekundær', color: '#D64545' },
  'andet':           { label: 'Andet',                        shortLabel: 'Andet',    color: '#999'    },
};

const INDSATS_META = {
  ingen:   { label: 'Ingen kontakt endnu',    color: '#999',     rank: 0 },
  kontakt: { label: 'Kontakt etableret',      color: '#6B8CAE',  rank: 1 },
  mode:    { label: 'Personligt møde',       color: '#7FA089',  rank: 2 },
  folge:   { label: 'Følgeskab',             color: '#E87A3E',  rank: 3 },
  fler:    { label: 'Fler-aftaleforløb',     color: '#D64545',  rank: 4 },
};

// Beregner nøgletal fra event-log (afledt, ingen redundante felter)
const calcMenneskeStats = (menneskeId) => {
  const all    = (window.SoS_KONTAKTER || []).filter(k => k.menneskeId === menneskeId);
  const done   = all.filter(k => k.status === 'gennemfoert');
  const mode   = done.filter(k => k.type === 'mode-brobygger');
  const folge  = done.filter(k => k.type === 'folge-primaer' || k.type === 'folge-sekundaer');
  const fPrim  = done.filter(k => k.type === 'folge-primaer');
  const fSek   = done.filter(k => k.type === 'folge-sekundaer');
  let niveau = 'ingen';
  if (done.length  >= 1) niveau = 'kontakt';
  if (mode.length  >= 1) niveau = 'mode';
  if (folge.length >= 1) niveau = 'folge';
  if (folge.length >= 2) niveau = 'fler';
  return {
    alle: all,
    antalKontakter:    all.length,
    antalGennemfoerte: done.length,
    antalFolgeskaber:  folge.length,
    antalFolgePrimaer: fPrim.length,
    antalFolgeSekundaer: fSek.length,
    antalMode:         mode.length,
    indsatsniveau:     niveau,
  };
};

// SROI-snapshot til rapport/eksport (alle mennesker)
// calcSROISnapshot returnerer KUN aggregerede tæller — aldrig per-borger objekter.
// Mental test: "Hvad er SROI-værdien for borger X?" → svaret er: "Den findes ikke."
window.calcSROISnapshot = () => {
  const mennesker = Object.values(window.SoS_MENNESKER || {});
  const result = {
    total: mennesker.length,
    byNiveau: { ingen: 0, kontakt: 0, mode: 0, folge: 0, fler: 0 },
    byMaalgruppe: {},
    byType: {},
    byIntensitet: { '0': 0, '1': 0, '2-3': 0, '4+': 0 },
  };
  mennesker.forEach(m => {
    const s = calcMenneskeStats(m.id);
    // Niveau
    result.byNiveau[s.indsatsniveau] = (result.byNiveau[s.indsatsniveau] || 0) + 1;
    // Type
    result.byType[m.type] = (result.byType[m.type] || 0) + 1;
    // SROI-målgruppe (analytisk)
    const mg = m.sroiMaalgruppe || 'uoplyst';
    result.byMaalgruppe[mg] = (result.byMaalgruppe[mg] || 0) + 1;
    // Intensitet
    const intKey = s.antalFolgeskaber >= 4 ? '4+' : s.antalFolgeskaber >= 2 ? '2-3' : s.antalFolgeskaber === 1 ? '1' : '0';
    result.byIntensitet[intKey] = (result.byIntensitet[intKey] || 0) + 1;
  });
  return result;
};

const KontaktLogFlow = ({ onClose, onSave }) => {
  const [step,      setStep]      = React.useState(0);
  const [type,      setType]      = React.useState(null);
  const [menId,     setMenId]     = React.useState(null);
  const [dato,      setDato]      = React.useState('2026-04-26');
  const [varighed,  setVarighed]  = React.useState('30');
  const [note,      setNote]      = React.useState('');
  const [done,      setDone]      = React.useState(false);

  const valgtType = KONTAKT_TYPER.find(t => t.id === type);
  const valgtMen  = menId ? SoS_MENNESKER[menId] : null;
  const menList   = Object.values(SoS_MENNESKER).filter(m => m.status !== 'afsluttet');

  const registrer = () => {
    if (onSave) onSave({ type, menId, dato, varighed, note });

    position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.48)',

  if (done) return (
    <div style={sheetStyle}>
      <div style={{ ...panelStyle, padding: '32px 24px 48px', textAlign: 'center' }}>
        <div style={{ width: 60, height: 60, borderRadius: 30,
          background: valgtType ? valgtType.color + '22' : SoS.sageSoft,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          margin: '0 auto 18px' }}>
          <Icon name="check" size={26} color={valgtType ? valgtType.color : SoS.sage}/>
        </div>
        <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500,
          color: SoS.ink, marginBottom: 8 }}>
          Kontakt registreret

        <div style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.inkSoft,
          lineHeight: 1.6, marginBottom: 6 }}>
          <strong>{valgtType ? valgtType.label : ''}</strong>
          {valgtMen ? ' med ' + valgtMen.firstName + ' ' + valgtMen.lastName : ''}

        <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkMuted,
          marginBottom: 28 }}>
          {dato} · {varighed} min

        <div style={{ background: '#fff', borderRadius: SoS.r.md,
          padding: '10px 14px', marginBottom: 24,

          border: 'none', borderRadius: SoS.r.md, fontFamily: SoS.sans,
          fontSize: 15, fontWeight: 600, cursor: 'pointer' }}>Luk</button>
      </div>
    </div>
  );

    <div style={sheetStyle}>
      <div style={panelStyle}>
        {/* Handle + header */}

          <div style={{ width: 38, height: 4, borderRadius: 2, background: SoS.lineSoft }}/>

          <button onClick={onClose} style={{

            <div style={{ marginBottom: 14 }}>

const RaadgiverKalender = ({ viewingHq, typeFilter: tfProp, setTypeFilter: setTfProp }) => {

  const byDay = Array.from({length: 7}, () => []);
  SoS_APPOINTMENTS_BUSY.forEach(a => {
    const d = new Date(a.date);

              <button key={i} onClick={() => setSelDay(i)} style={{
                flex: 1, padding: '8px 2px 10px', borderRadius: SoS.r.md, border: 'none',

              const m = SoS_MENNESKER[a.menneskeId];

              return (

                            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                            <span style={{ fontFamily: SoS.sans, fontSize: 8,
                              fontWeight: 700, color: '#fff' }}>{m ? m.initials : '?'}</span>
                          </div>
                          <div>
                            <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600, color: SoS.ink }}>
                              {m ? m.firstName : 'Ukendt'}
                            </div>
                            <div style={{ fontFamily: SoS.sans, fontSize: 10, color: SoS.inkSoft }}>
                              {type.short || ''} · {m ? m.age : ''}
                            </div>
                          </div>

                        {bb && (
                          <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8,
                            background: SoS.creamDeep, borderRadius: SoS.r.sm, padding: '6px 10px' }}>

                    </div>

                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
    {selectedAppt && (
      <StaffApptDetail appt={selectedAppt} onClose={() => setSelectedAppt(null)}/>
    )}
    </>
  );
};

const AdminMobileBeskeder = ({ isAdmin, viewingHq }) => {

              <div style={{ width: 4, height: 44, borderRadius: 2, background: type.color || SoS.orange, flexShrink: 0 }}/>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', gap: 8, alignItems: 'baseline' }}>
                  <span style={{ fontFamily: SoS.font, fontSize: 16, fontWeight: 500, color: SoS.ink }}>{a.start}</span>

          );
        })}
      </div>
    </div>
    {selectedAppt && (

    </>
  );
};

            }}>

                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>

                <Icon name="pin" size={20} color={SoS.ink}/>

          </div>

          {/* Hovedsæde indicator */}
          <div onClick={onOpenSettings} style={{
            display: 'flex', alignItems: 'center', gap: 8,
            padding: '10px 14px',
            background: isTemporary ? SoS.sun + '22' : SoS.creamDeep,
            border: isTemporary ? `1px solid ${SoS.sun}` : 'none',
            borderRadius: 12, cursor: 'pointer',
          }}>
            <div style={{ width: 10, height: 10, borderRadius: 5,
              background: SoS.hq[viewingHq] || SoS.orange }}/>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, color: SoS.ink }}>
                {viewingHq}
              </div>
              {isTemporary && (
                <div style={{ fontFamily: SoS.sans, fontSize: 10, color: '#8A6D1E', marginTop: 1 }}>
                  ⚠ Midlertidig visning · dit eget: {ownHq}
                </div>
              )}
            </div>
            <Icon name="chevron" size={16} color={SoS.inkSoft}/>
          </div>
        </div>

        {tab === 'arbejde' && (
          <>
            {/* Type-filter — prominent */}
            {typeFilter !== 'alle' && (() => {
              const t = SoS_TYPER[typeFilter];
              return (
                <div style={{ padding: '10px 16px', background: t.soft,
                  borderBottom: `1px solid ${t.color}30`,
                  display: 'flex', alignItems: 'center', gap: 8 }}>
                  <Icon name={t.icon} size={13} color={t.color}/>
                  <span style={{ fontFamily: SoS.sans, fontSize: 12,
                    color: t.color, fontWeight: 600 }}>
                    Filtrerer: {t.label}
                  </span>
                  <button onClick={() => setTypeFilter('alle')} style={{
                    marginLeft: 'auto', background: 'none', border: 'none',
                    fontFamily: SoS.sans, fontSize: 11, color: t.color,
                    cursor: 'pointer', padding: '2px 8px',
                    borderRadius: 999, fontWeight: 600,
                  }}>× Nulstil</button>
                </div>
              );
            })()}
            <div style={{ padding: '16px 16px 12px', background: '#fff',
              borderBottom: `1px solid ${SoS.lineSoft}` }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkMuted, letterSpacing: 0.8, textTransform: 'uppercase',
                marginBottom: 10 }}>Vis brobygningstype</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
                {[
                  { id: 'alle',    label: 'Alle',    color: SoS.ink,    soft: SoS.creamDeep, icon: null },
                  { id: 'sundhed', label: 'Sundhed', color: SoS_TYPER.sundhed.color, soft: SoS_TYPER.sundhed.soft, icon: 'sundhed' },
                  { id: 'forening',label: 'Forening',color: SoS_TYPER.forening.color,soft: SoS_TYPER.forening.soft,icon: 'forening' },
                  { id: 'social',  label: 'Social',  color: SoS_TYPER.social.color,  soft: SoS_TYPER.social.soft,  icon: 'social' },

                      display: 'flex', flexDirection: 'column', alignItems: 'center',
                      justifyContent: 'center', gap: 6,
                      padding: '12px 4px',
                      background: sel ? f.color : f.soft,
                      border: `2px solid ${sel ? f.color : 'transparent'}`,
                      borderRadius: SoS.r.md,
                      cursor: 'pointer',
                      transition: 'all 0.15s',
                      boxShadow: sel ? SoS.shadow.sm : 'none',
                    }}>
                      {f.icon && (
                        <Icon name={f.icon === 'sundhed' ? 'heart' : f.icon === 'forening' ? 'users' : 'heart'}
                          size={18} color={sel ? '#fff' : f.color}/>
                      )}
                      {!f.icon && (
                        <div style={{ width: 18, height: 18, borderRadius: 9,
                          background: sel ? 'rgba(255,255,255,0.3)' : SoS.lineSoft,
                          display: 'flex', alignItems: 'center', justifyContent: 'center' }}>

                            background: sel ? '#fff' : SoS.inkSoft }}/>

                      )}
                      <span style={{
                        fontFamily: SoS.sans, fontSize: 11, fontWeight: sel ? 700 : 500,
                        color: sel ? '#fff' : f.color,
                        letterSpacing: 0.2,
                      }}>{f.label}</span>
                    </button>
                  );
                })}
              </div>
              {typeFilter !== 'alle' && (() => {
                const t = SoS_TYPER[typeFilter];
                const count = Object.values(SoS_MENNESKER).filter(m =>
                  m.type === typeFilter && m.status === 'aktiv').length;
                return (
                  <div style={{ marginTop: 10, padding: '8px 12px',
                    background: t.soft, borderRadius: SoS.r.sm,
                    display: 'flex', alignItems: 'center', gap: 8 }}>

                    <span style={{ fontFamily: SoS.sans, fontSize: 12,
                      color: t.color, fontWeight: 600 }}>
                      {count} aktive mennesker · {t.label}
                    </span>
                    <button onClick={() => setTypeFilter('alle')} style={{
                      marginLeft: 'auto', background: 'none', border: 'none',
                      fontFamily: SoS.sans, fontSize: 11, color: t.color,
                      cursor: 'pointer', padding: '2px 8px',
                      borderRadius: 999, fontWeight: 600,
                    }}>× Nulstil</button>
                  </div>
                );
              })()}
            </div>

            {/* Handlinger */}
            <div style={{ padding: '16px 20px 8px' }}>

            </div>
            <div style={{ padding: '0 20px' }}>
              <ActionCard color={SoS.orange} bg={SoS.orange + '15'} icon="match"
                title={`${pendingMatches} mennesker venter på match`}
                subtitle="Start matching — vælg menneske og brobygger"
                onClick={onOpenMatching}/>
              <ActionCard color={SoS.sage} bg={SoS.sageSoft} icon="bell"
                title="3 aftale-noter modtaget i dag"
                subtitle="Nye registreringer fra brobyggere"
                onClick={() => setTab('rapport')}/>
            </div>
            <div style={{ padding: '8px 20px 0' }}>
              <button onClick={onOpenIntake} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                gap: 8, width: '100%', padding: '13px 0',
                background: SoS.orange, color: '#fff', border: 'none',
                borderRadius: SoS.r.md, fontFamily: SoS.sans, fontSize: 14,
                fontWeight: 600, cursor: 'pointer',
              }}>
                <Icon name="user" size={16} color="#fff"/>
                Registrer nyt menneske
              </button>
            </div>

            {/* Brobygninger i denne uge */}
            {(() => {
              const ugeData = SoS_BROBYGGERE.filter(b => b.status !== 'pause');
              const totalUge = ugeData.reduce((s, b) => s + b.thisWeek, 0);
              const max = Math.max(...ugeData.map(b => b.thisWeek), 1);
              return (
                <div style={{ padding: '16px 20px 8px' }}>
                  <SectionHead title="Brobygninger denne uge"/>
                  <div style={{
                    background: '#fff', borderRadius: SoS.r.lg,
                    border: `1px solid ${SoS.lineSoft}`, overflow: 'hidden',
                  }}>
                    {/* Total pill row */}
                    <div style={{
                      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                      padding: '14px 16px 10px',
                      borderBottom: `1px solid ${SoS.lineSoft}`,
                    }}>
                      <div>
                        <span style={{ fontFamily: SoS.font, fontSize: 34, fontWeight: 500,
                          color: SoS.ink, lineHeight: 1 }}>{totalUge}</span>
                        <span style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
                          marginLeft: 8 }}>brobygninger</span>
                      </div>
                      <div style={{ textAlign: 'right' }}>
                        <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkMuted,
                          letterSpacing: 0.3, textTransform: 'uppercase', fontWeight: 600 }}>
                          Uge 17
                        </div>
                        <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.sage,
                          marginTop: 2 }}>↑ 3 fra sidste uge</div>
                      </div>
                    </div>
                    {/* Per-brobygger mini bars */}
                    <div style={{ padding: '10px 16px 12px' }}>
                      {ugeData
                        .filter(b => b.thisWeek > 0 || b.status === 'aktiv')
                        .sort((a, b) => b.thisWeek - a.thisWeek)
                        .map(b => (
                          <div key={b.id} onClick={() => setSelectedBb(b)} style={{
                            display: 'flex', alignItems: 'center', gap: 10,
                            marginBottom: 7, cursor: 'pointer',
                          }}>
                            <div style={{
                              width: 26, height: 26, borderRadius: 13,
                              background: b.bg, display: 'flex',
                              alignItems: 'center', justifyContent: 'center',
                              flexShrink: 0,
                            }}>
                              <span style={{ fontFamily: SoS.sans, fontSize: 9,
                                fontWeight: 700, color: '#fff' }}>{b.avatar}</span>
                            </div>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ display: 'flex', justifyContent: 'space-between',
                                marginBottom: 3 }}>
                                <span style={{ fontFamily: SoS.sans, fontSize: 11,
                                  color: SoS.ink, fontWeight: 500,
                                  overflow: 'hidden', textOverflow: 'ellipsis',
                                  whiteSpace: 'nowrap' }}>
                                  {b.name.split(' ')[0]}
                                </span>
                                <span style={{ fontFamily: SoS.sans, fontSize: 11,
                                  color: b.thisWeek > 0 ? SoS.ink : SoS.inkMuted,
                                  fontWeight: b.thisWeek > 0 ? 600 : 400,
                                  flexShrink: 0, marginLeft: 6 }}>
                                  {b.thisWeek}
                                </span>
                              </div>
                              <div style={{ height: 4, background: SoS.lineSoft,
                                borderRadius: 2, overflow: 'hidden' }}>
                                <div style={{
                                  width: `${(b.thisWeek / max) * 100}%`,
                                  height: '100%', borderRadius: 2,
                                  background: b.thisWeek >= 3 ? SoS.sage
                                            : b.thisWeek >= 1 ? SoS.orange
                                            : SoS.lineSoft,
                                  transition: 'width 0.4s ease',
                                }}/>
                              </div>
                            </div>
                          </div>
                        ))
                      }
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* I dag */}
            <div style={{ padding: '8px 20px 8px' }}>
              <SectionHead title="Aftaler i dag"/>
            </div>
            <div style={{ padding: '0 20px 16px' }}>
              {(() => {
                const appts = todayAppts.filter(a => {
                  const m = SoS_MENNESKER[a.menneskeId];
                  return !m || typeFilter === 'alle' || m.type === typeFilter;
                });
                if (appts.length === 0) return (
                  <div style={{ padding: '24px 20px', textAlign: 'center' }}>
                    <div style={{ fontFamily: SoS.sans, fontSize: 13,
                      color: SoS.inkMuted, lineHeight: 1.6 }}>
                      {typeFilter !== 'alle'
                        ? `Ingen aftaler i dag for ${SoS_TYPER[typeFilter]?.label?.toLowerCase()}brobygninger`
                        : 'Ingen aftaler planlagt i dag'}
                    </div>
                  </div>
                );
                return appts.map(a => {
                const menneske = SoS_MENNESKER[a.menneskeId];
                const type = SoS_TYPER[menneske.type];
                return (
                  <div key={a.id} onClick={() => setSelectedAppt(a)} style={{
                    display: 'flex', gap: 12, alignItems: 'center',
                    padding: 14, background: '#fff', borderRadius: SoS.r.md,
                    border: `1px solid ${SoS.lineSoft}`, marginBottom: 8,
                    cursor: 'pointer',
                  }}>
                    <div style={{ width: 4, height: 40, borderRadius: 2,
                      background: type.color }}/>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: 'flex', gap: 6, alignItems: 'baseline' }}>
                        <span style={{ fontFamily: SoS.font, fontSize: 16,
                          fontWeight: 500, color: SoS.ink }}>{a.start}</span>
                        <span style={{ fontFamily: SoS.sans, fontSize: 12,
                          color: SoS.inkSoft }}>· {a.activity}</span>
                      </div>
                      <div style={{ fontFamily: SoS.sans, fontSize: 12,
                        color: SoS.inkSoft, marginTop: 2 }}>
                        {menneske.firstName} ({menneske.age}) · Maja H.
                      </div>
                    </div>
                  </div>
                );
              });})()}
            </div>

            {/* Match-frist advarsel */}
            {(() => {
              const frist = window.MATCH_FRIST_TIMER || 72;
              const now = new Date('2026-04-27T10:00:00');
              const overdueList = Object.values(SoS_MENNESKER).filter(m => {
                if (m.matchedWith || !m.registeredAt) return false;
                if (typeFilter !== 'alle' && m.type !== typeFilter) return false;
                const hrs = (now - new Date(m.registeredAt)) / 3600000;
                return hrs > frist;
              });
              if (overdueList.length === 0) return null;
              return (
                <div style={{ padding: '8px 20px 0' }}>
                  <div onClick={onOpenMatching} style={{
                    display: 'flex', gap: 14, padding: 14,
                    background: SoS.rose + '15', borderRadius: SoS.r.md,
                    border: '1.5px solid ' + SoS.rose, cursor: 'pointer',
                  }}>
                    <div style={{ width: 42, height: 42, borderRadius: 21, background: SoS.rose + '22',
                      flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      <Icon name="clock" size={22} color={SoS.rose}/>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 700, color: SoS.rose }}>
                        {overdueList.length} {overdueList.length === 1 ? 'person mangler' : 'personer mangler'} match
                      </div>
                      <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, marginTop: 2, lineHeight: 1.4 }}>
                        {overdueList.map(m => m.firstName).join(', ')} — venter mere end {frist} timer
                      </div>
                    </div>
                    <Icon name="chevron" size={16} color={SoS.rose}/>
                  </div>
                </div>
              );
            })()}

            {/* Quick links */}
            <div style={{ padding: '8px 20px 16px' }}>
              <SectionHead title="Genveje"/>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <QuickLink icon="users" label="Brobyggere" count={brobyggere.length}
                  onClick={() => setTab('brobyggere')}/>
                <QuickLink icon="heart" label="Mennesker" count={Object.keys(SoS_MENNESKER).length}
                  onClick={() => setTab('mennesker')}/>
                <QuickLink icon="calendar" label="Kalender" count="Uge 17"
                  onClick={() => setTab('overview')}/>
                <QuickLink icon="bell" label="Beskeder" count="2 nye"
                  onClick={() => setTab('beskeder')}/>
              </div>
            </div>

            {/* Desktop-promo */}
            <div style={{ margin: '8px 20px 16px', padding: 18,
              background: `linear-gradient(135deg, ${SoS.ink}, #3A2B1F)`,
              borderRadius: SoS.r.lg, color: '#fff',
              display: 'flex', gap: 14, alignItems: 'center',
            }}>
              <div style={{ width: 42, height: 42, borderRadius: 8,
                background: 'rgba(255,255,255,0.1)', flexShrink: 0,
                display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name="chart" size={22} color="#fff"/>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, marginBottom: 2 }}>
                  Statistik & rapporter
                </div>
                <div style={{ fontFamily: SoS.sans, fontSize: 11, opacity: 0.75, lineHeight: 1.4 }}>
                  Kun tilgængelig på computer — af sikkerhedshensyn
                </div>
              </div>
              <button onClick={onOpenDesktop} style={{
                background: SoS.orange, border: 'none', color: '#fff',
                padding: '8px 14px', borderRadius: 999,
                fontFamily: SoS.sans, fontSize: 12, fontWeight: 600, cursor: 'pointer',
                flexShrink: 0,
              }}>Se demo</button>
            </div>
          </>
        )}

        {tab === 'beskeder' && <AdminMobileBeskeder isAdmin={isAdmin} viewingHq={viewingHq}/>}

        {tab === 'brobyggere' && (
          <div style={{ position: 'relative' }}>
            <div style={{ background: '#fff', borderBottom: `1px solid ${SoS.lineSoft}`, padding: '54px 20px 14px' }}>
              <button onClick={() => setTab('arbejde')} style={{
                display: 'flex', alignItems: 'center', gap: 6, background: 'none', border: 'none',
                cursor: 'pointer', padding: 0, marginBottom: 10,
                fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
              }}>
                <Icon name="chevronL" size={16} color={SoS.inkSoft}/> Arbejde
              </button>
              <div style={{ fontFamily: SoS.font, fontSize: 24, fontWeight: 500, color: SoS.ink }}>
                Brobyggere
              </div>
            </div>
            <AdminBrobyggereScreen hovedsaede={viewingHq} onOpenMatching={onOpenMatching} typeFilter={typeFilter}/>
          </div>
        )}

        {tab === 'mennesker' && (
          <div>
            <div style={{ background: '#fff', borderBottom: `1px solid ${SoS.lineSoft}`, padding: '54px 20px 8px' }}>
              <button onClick={() => setTab('arbejde')} style={{
                display: 'flex', alignItems: 'center', gap: 6, background: 'none', border: 'none',
                cursor: 'pointer', padding: 0, marginBottom: 0,
                fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
              }}>
                <Icon name="chevronL" size={16} color={SoS.inkSoft}/> Arbejde
              </button>
            </div>
            <AdminMenneskeListe viewingHq={viewingHq} onOpenMatching={onOpenMatching} typeFilter={typeFilter}/>
          </div>
        )}

        {(tab === 'overview' || tab === 'kalender') && (
          <RaadgiverKalender viewingHq={viewingHq} typeFilter={typeFilter} setTypeFilter={setTypeFilter}/>
        )}

        {tab === 'profil' && (
          <AdminProfileContent user={user} ownHq={ownHq} isAdmin={isAdmin}
            onOpenSettings={onOpenSettings} onOpenDesktop={onOpenDesktop}/>
        )}
      </div>
      <AdminMobileTabBar active={tab} onChange={setTab} isAdmin={isAdmin}/>
      {selectedBb && (
        <div style={{ position: "absolute", inset: 0, overflowY: "auto", zIndex: 100, background: SoS.cream }}>
          <BrobyggerProfilePanel brobygger={selectedBb} onClose={() => setSelectedBb(null)}/>
        </div>
      )}
      {selectedAppt && (
        <div style={{ position: "absolute", inset: 0, overflowY: "auto", zIndex: 100 }}>
          <AppointmentDetailScreen appt={selectedAppt} onBack={() => setSelectedAppt(null)} onComplete={() => setSelectedAppt(null)}/>
        </div>
      )}
    </div>
  );
};

// Action cards
const ActionCard = ({ color, bg, icon, title, subtitle, onClick }) => (
  <button onClick={onClick} style={{
    display: 'flex', alignItems: 'center', gap: 14, width: '100%',
    padding: 16, background: bg, border: 'none', borderRadius: SoS.r.md,
    textAlign: 'left', cursor: 'pointer', marginBottom: 8,
  }}>

// Settings — temporary HQ switch
const AdminSettings = ({ currentHq, ownHq, onPick, onClose, isAdmin }) => {
  const [section, setSection] = React.useState(null);
  const [picked, setPicked] = React.useState(currentHq);
  const [dataAccess, setDataAccess] = React.useState({ daysBefore: 7, daysAfter: 7 });
  const [lifecycle, setLifecycle] = React.useState({ warningMonths: 2, pauseMonths: 4, endMonths: 8 });
  const [staff, setStaff] = React.useState(SoS_MEDARBEJDERE.filter(u => u.hq === ownHq));
  const [saved, setSaved] = React.useState(false);
  const [bbInvite, setBbInvite] = React.useState({ name: '', email: '', phone: '' });
  const [bbSent, setBbSent] = React.useState(false);
  const [staffInvite, setStaffInvite] = React.useState({ name: '', email: '', role: 'raadgiver' });
  const [staffSent, setStaffSent] = React.useState(false);
  const [sroiRates, setSroiRates] = React.useState(
    window.SROI_SETTINGS || { sundhed: 1840, forening: 1420, social: 1260, investment: 8400000 }
  );
  const [sroiSaved, setSroiSaved] = React.useState(false);
  const [activeTypes, setActiveTypes] = React.useState(
    (window.HQ_ACTIVE_TYPES && window.HQ_ACTIVE_TYPES[ownHq]) || Object.keys(SoS_TYPER)
  );
  const [matchFrist, setMatchFrist] = React.useState(window.MATCH_FRIST_TIMER || 72);
  const [matchFristSaved, setMatchFristSaved] = React.useState(false);
  const saveMatchFrist = () => {
    window.MATCH_FRIST_TIMER = matchFrist;
    const s = window.SoS_STORE?.load('settings') || {};
    window.SoS_STORE?.save('settings', { ...s, matchFrist });
    setMatchFristSaved(true); setTimeout(() => setMatchFristSaved(false), 1500);
  };
  const saveSROI = () => {
    window.SROI_SETTINGS = { ...sroiRates };
    const s = window.SoS_STORE?.load('settings') || {};
    window.SoS_STORE?.save('settings', { ...s, sroi: { ...sroiRates } });
    setSroiSaved(true); setTimeout(() => setSroiSaved(false), 1500);
  };

  // Gem medarbejder-ændringer (roller + aktiv/inaktiv) løbende
  React.useEffect(() => {
    if (!window.SoS_STORE) return;
    const all = (window.SoS_MEDARBEJDERE || []).map(u => {
      const updated = staff.find(s => s.id === u.id);
      return updated || u;
    });
    window.SoS_MEDARBEJDERE = all;
    window.SoS_STORE.save('medarbejdere', all);
  }, [staff]);

  const TODAY = new Date('2026-04-24');
  const monthsSince = (d) => (TODAY - new Date(d)) / (1000 * 60 * 60 * 24 * 30.4);
  const bbAlert = (b) => {
    if (!b.lastActive) return null;
    if (b.pauseUntil && b.pauseUntil >= '2026-04-26') return null;
    const m = monthsSince(b.lastActive);
    if (m >= lifecycle.endMonths)     return { label: 'Afsluttes snart',  color: SoS.rose };
    if (m >= lifecycle.pauseMonths)   return { label: 'Foreslås pause',   color: SoS.sun };
    if (m >= lifecycle.warningMonths) return { label: 'Inaktiv',          color: SoS.sun };
    return null;
  };
  const atRisk = SoS_BROBYGGERE.filter(b => bbAlert(b));
  const saveAndBack = () => { setSaved(true); setTimeout(() => { setSaved(false); setSection(null); }, 1200); };


  const SECTIONS = [
    { id: 'hq',          icon: 'building', label: 'Hovedsæde',            sub: `Viser ${currentHq}`, show: true },
    { id: 'staff',       icon: 'users',    label: 'Medarbejdere & roller', sub: `${staff.filter(u=>u.active!==false).length} aktive · ${staff.filter(u=>u.active===false).length} inaktive`, show: isAdmin },
    { id: 'invite-bb',   icon: 'user',     label: 'Inviter brobygger',     sub: 'Send invitationslink', show: true },
    { id: 'match-frist', icon: 'clock',    label: 'Matching-frist',        sub: `Advarsel efter ${matchFrist} timer`, show: isAdmin },
    // Følgende sektioner er kun tilgængelige via desktop:
    // data (Databeskyttelse), typer (Brobygningstyper), lifecycle (Brobygger-livscyklus), sroi (Effekt-parametre)
  ];
  const TITLES = {
    typer: 'Brobygningstyper',
        hq: 'Hovedsæde', data: 'Databeskyttelse', lifecycle: 'Brobygger-livscyklus',
    staff: 'Medarbejdere & roller', 'invite-bb': 'Inviter brobygger', sroi: 'Effekt-parametre', 'match-frist': 'Matching-frist',
  };

  return (
    <div style={{ position: 'absolute', inset: 0, background: SoS.cream, display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div style={{ padding: '54px 20px 16px', background: '#fff',
        borderBottom: `1px solid ${SoS.lineSoft}`,
        display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
        <button onClick={section ? () => setSection(null) : onClose}
          style={{ background: 'none', border: 'none', padding: 4, cursor: 'pointer' }}>
          <Icon name="chevronL" size={22} color={SoS.ink}/>
        </button>
        <div>
          <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500 }}>
            {section ? TITLES[section] : 'Indstillinger'}
          </div>
          {!section && <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft }}>
            {ownHq} · {isAdmin ? 'Admin' : 'Rådgiver'}
          </div>}
        </div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, overflowY: 'auto', padding: 20 }}>

        {/* MENU */}
        {!section && (<>
          {SECTIONS.filter(s => s.show).map(s => (
            <button key={s.id} onClick={() => setSection(s.id)} style={{
              display: 'flex', alignItems: 'center', gap: 14, width: '100%',
              padding: '14px 16px', marginBottom: 8, textAlign: 'left',
              background: '#fff', border: `1px solid ${SoS.lineSoft}`,
              borderRadius: SoS.r.md, cursor: 'pointer',
            }}>
              <div style={{ width: 40, height: 40, borderRadius: 20, background: SoS.creamDeep,
                flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name={s.icon} size={18} color={SoS.inkSoft}/>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink }}>{s.label}</div>
                <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, marginTop: 2 }}>{s.sub}</div>
              </div>
              <Icon name="chevronR" size={16} color={SoS.inkMuted}/>
            </button>
          ))}
          {atRisk.length > 0 && (
            <div style={{ marginTop: 8, padding: '12px 14px', background: SoS.sun + '22',
              border: `1px solid ${SoS.sun}`, borderRadius: SoS.r.md }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 700, color: SoS.orangeDeep }}>
                {atRisk.length} brobygger{atRisk.length > 1 ? 'e' : ''} kræver opmærksomhed
              </div>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft, marginTop: 3 }}>
                {atRisk.map(b => b.name.split(' ')[0]).join(', ')} — administrér via desktop
              </div>
            </div>
          )}
        </>)}

        {/* HQ */}
        {section === 'hq' && (<>
          <SectionHead title="Dit hovedsæde"/>
          <div style={{ background: '#fff', borderRadius: SoS.r.md, padding: 16,
            border: `1px solid ${SoS.lineSoft}`, marginBottom: 20,
            display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 12, height: 12, borderRadius: 6, background: SoS.hq[ownHq] || SoS.orange }}/>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink }}>{ownHq}</div>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft }}>Dit primære hovedsæde</div>
            </div>
            <Pill bg={SoS.sageSoft} color={SoS.sage}>Standard</Pill>
          </div>
          <SectionHead title="Midlertidigt skift"/>
          <div style={{ padding: 12, background: SoS.creamDeep, borderRadius: SoS.r.md,
            marginBottom: 12, display: 'flex', gap: 10 }}>
            <Icon name="lock" size={16} color={SoS.orangeDeep}/>
            <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.orangeDeep, lineHeight: 1.5 }}>
              Nulstilles ved logout. Handlinger logges i revisionsspor.
            </div>
          </div>
          {SoS_HOVEDSAEDER.filter(h => h !== ownHq).map(h => {
            const sel = picked === h;
            return (
              <button key={h} onClick={() => setPicked(h)} style={{
                display: 'flex', alignItems: 'center', gap: 12, width: '100%',
                padding: 14, marginBottom: 6, textAlign: 'left', background: '#fff',
                border: `2px solid ${sel ? (SoS.hq[h] || SoS.orange) : SoS.lineSoft}`,
                borderRadius: SoS.r.md, cursor: 'pointer',
              }}>
                <div style={{ width: 12, height: 12, borderRadius: 6, background: SoS.hq[h] || SoS.orange }}/>
                <span style={{ flex: 1, fontFamily: SoS.sans, fontSize: 14, color: SoS.ink }}>{h}</span>
                {sel && <Icon name="check" size={16} color={SoS.hq[h] || SoS.orange}/>}
              </button>
            );
          })}
          <button onClick={() => onPick(picked)} style={{
            width: '100%', marginTop: 12, padding: '14px 0',
            background: picked !== currentHq ? SoS.orange : SoS.lineSoft,
            color: picked !== currentHq ? '#fff' : SoS.inkMuted,

            fontFamily: SoS.sans, fontSize: 15, fontWeight: 600, cursor: 'pointer',
          }}>Skift til {picked}</button>

              color: SoS.orange, marginBottom: 4 }}>GDPR — Artikel 9 (følsomme oplysninger)</div>

            <NumStepper label="Dage efter aftalen" unit="dage"
              sublabel="Adgang fortsætter X dage efter seneste brobygning"

          <div style={{ background: SoS.creamDeep, borderRadius: SoS.r.md,
            padding: '12px 14px', marginBottom: 20 }}>
            <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600, color: SoS.ink, marginBottom: 4 }}>
              Eksempel med nuværende indstillinger

            {(() => {
              const appt = new Date('2026-05-01');

              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600, color: SoS.ink }}>
                  Vis faglig helbreds-sektion
                </div>
                <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft,
                  marginTop: 3, lineHeight: 1.4 }}>
                  Kategorier og helbredsnoter i intake-flow og borger-profil.
                </div>

                  setSaved(false);
                  setDataAccess(d => ({ ...d })); // force re-render
                }}
                style={{
                  width: 48, height: 28, borderRadius: 14,
                  background: (window.SoS_SETTINGS || {}).visHelbredsforhold !== false ? SoS.sage : SoS.lineSoft,

                  transition: 'background 0.2s', flexShrink: 0,

                <div style={{

                  position: 'absolute', top: 4,
                  left: (window.SoS_SETTINGS || {}).visHelbredsforhold !== false ? 24 : 4,

          }}>{saved ? '✓ Gemt' : 'Gem indstillinger'}</button>

          <div style={{ background: '#fff', borderRadius: SoS.r.md,
            border: `1px solid ${SoS.lineSoft}`, padding: '0 16px', marginBottom: 20 }}>

              onChange={v => setLifecycle(l => ({ ...l, warningMonths: v }))}/>
            <NumStepper label="Automatisk pause" unit="mån."
              sublabel="Måneder uden brobygning → status sættes til 'pause'"
              value={lifecycle.pauseMonths} min={1} max={24}
              onChange={v => setLifecycle(l => ({ ...l, pauseMonths: v }))}/>
            <NumStepper label="Automatisk afslutning" unit="mån."
              sublabel="Måneder uden aktivitet → brobygger afsluttes automatisk"
              value={lifecycle.endMonths} min={1} max={36}
              onChange={v => setLifecycle(l => ({ ...l, endMonths: v }))}/>
          </div>
          {atRisk.length > 0 && (<>
            <SectionHead title="Kræver opmærksomhed nu"/>
            {atRisk.map(b => {
              const st = bbAlert(b);
              const m = monthsSince(b.lastActive);
              return (
                <div key={b.id} style={{ display: 'flex', alignItems: 'center', gap: 12,
                  padding: 14, background: '#fff', marginBottom: 8,
                  borderRadius: SoS.r.md, border: `1.5px solid ${st.color}50` }}>
                  <div style={{ width: 36, height: 36, borderRadius: 18, background: b.bg,
                    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <span style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700, color: '#fff' }}>{b.avatar}</span>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600, color: SoS.ink }}>{b.name}</div>
                    <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft, marginTop: 2 }}>
                      Inaktiv {Math.round(m * 10) / 10} måneder
                      {` · sidst aktiv ${new Date(b.lastActive).toLocaleDateString('da-DK', { day: 'numeric', month: 'short' })}`}
                    </div>
                  </div>
                  <Pill bg={st.color + '22'} color={st.color}>{st.label}</Pill>
                </div>
              );
            })}
          </>)}
          <div style={{ background: SoS.creamDeep, borderRadius: SoS.r.md,
            padding: '12px 14px', marginBottom: 20 }}>
            <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600, color: SoS.ink, marginBottom: 4 }}>
              Om automatisk afslutning
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft, lineHeight: 1.5 }}>
              Når en brobygger afsluttes automatisk, sendes en venlig e-mail der takker
              for indsatsen og inviterer dem til at vende tilbage når de har tid.
              Aktive brobygningsforløb overføres til rådgiveren inden afslutning.
            </div>
          </div>
          <button onClick={saveAndBack} style={{
            width: '100%', padding: '14px 0',
            background: saved ? SoS.sage : SoS.orange, color: '#fff',
            border: 'none', borderRadius: SoS.r.md,
            fontFamily: SoS.sans, fontSize: 15, fontWeight: 600, cursor: 'pointer',
          }}>{saved ? '✓ Gemt' : 'Gem parametre'}</button>
        </>)}

        {/* MEDARBEJDERE */}
        {section === 'staff' && (<>
          <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
            marginBottom: 16, lineHeight: 1.5 }}>
            Tildel roller til medarbejdere på {ownHq}. Kun admins kan ændre roller og aktivere/deaktivere adgang.
          </div>
          {staff.map(u => {
            const isInactive = u.active === false;
            return (
            <div key={u.id} style={{ display: 'flex', alignItems: 'center', gap: 12,
              padding: 14, background: isInactive ? '#FAFAFA' : '#fff', marginBottom: 8,
              borderRadius: SoS.r.md, border: `1px solid ${isInactive ? SoS.lineSoft : SoS.lineSoft}`,
              opacity: isInactive ? 0.65 : 1, transition: 'opacity .2s' }}>
              {/* Avatar */}
              <div style={{ width: 40, height: 40, borderRadius: 20,
                background: isInactive ? '#C8C8C8' : u.bg,
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <span style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 700, color: '#fff' }}>{u.avatar}</span>
              </div>
              {/* Navn + email */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600,
                    color: isInactive ? SoS.inkSoft : SoS.ink,
                    textDecoration: isInactive ? 'line-through' : 'none' }}>{u.name}</span>
                  {isInactive && (
                    <span style={{ fontFamily: SoS.sans, fontSize: 10, fontWeight: 700,
                      color: '#888', background: '#E8E8E8', borderRadius: 999,
                      padding: '2px 7px', letterSpacing: .3 }}>INAKTIV</span>
                  )}
                </div>
                <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft, marginTop: 1,
                  overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{u.email}</div>
              </div>
              {/* Rolle-vælger — kun synlig for aktive brugere */}
              {isAdmin && !isInactive && (
                <select value={u.role}
                  onChange={e => setStaff(s => s.map(m => m.id === u.id ? { ...m, role: e.target.value } : m))}
                  style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600,
                    color: u.role === 'admin' ? SoS.orange : SoS.sage,
                    background: u.role === 'admin' ? SoS.orange + '15' : SoS.sageSoft,
                    border: 'none', borderRadius: 999, padding: '5px 10px', cursor: 'pointer' }}>
                  <option value="raadgiver">Rådgiver</option>
                  <option value="admin">Admin</option>
                </select>
              )}
              {!isAdmin && !isInactive && (
                <Pill bg={u.role === 'admin' ? SoS.orange + '15' : SoS.sageSoft}
                  color={u.role === 'admin' ? SoS.orange : SoS.sage}>
