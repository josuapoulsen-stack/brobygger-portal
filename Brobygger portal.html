      letterSpacing: 0, color: SoS.inkMuted }}> ({note})</span>}
  </div>
);

const IntakeFlow = ({ onClose, viewingHq }) => {
  const [step, setStep] = React.useState(0);
  const [kilde, setKilde] = React.useState(null);
  const [kildeDetalje, setKildeDetalje] = React.useState(null);
  const [form, setForm] = React.useState({ firstName: '', lastName: '', age: '', phone: '' });
  const [type, setType] = React.useState(null);
  const [selectedBehov, setSelectedBehov] = React.useState([]);
  const [udfordringer, setUdfordringer] = React.useState('');
  const [sroiMaalgruppe, setSroiMaalgruppe] = React.useState('');
  const [helbredsKategorier, setHelbredsKategorier] = React.useState([]);
  const [note, setNote] = React.useState('');
  const [consent, setConsent] = React.useState(false);
  const [done, setDone] = React.useState(false);

  const STEPS = ['Kilde', 'Basisinfo', 'Behov', 'Brobygningsønske', 'Samtykke'];
  const selectedKildeObj = INTAKE_KILDER.find(k => k.id === kilde);
  const kildeHasSub = !!(selectedKildeObj && selectedKildeObj.sub);
  const canNext0 = !!kilde && (!kildeHasSub || !!kildeDetalje);
  const phoneDigits = form.phone.replace(/\D/g, '');
  const phoneOk = phoneDigits.length === 8;
  const canNext1 = form.firstName.trim().length > 0 && form.age.trim().length > 0 && phoneOk;
  const canNext2 = !!type && selectedBehov.length > 0;
  const [brobygDato, setBrobygDato] = React.useState('2026-05-06');
  const [brobygStart, setBrobygStart] = React.useState(null);
  const [brobygDuration, setBrobygDuration] = React.useState(null);
  const [brobygFrekvens, setBrobygFrekvens] = React.useState(null);
  const [brobygNote, setBrobygNote] = React.useState('');
  const [brobygSted, setBrobygSted] = React.useState(null);
  const canNext3 = !!brobygDato && !!brobygStart && !!brobygDuration;
  const canFinish = consent;

  const toggleBehov = (b) =>
    setSelectedBehov(prev => prev.includes(b) ? prev.filter(x => x !== b) : [...prev, b]);

  const handleFinish = () => {
    const id = 'b-' + Date.now();
    const newPerson = {
      id,
      firstName: form.firstName.trim(),
      lastName:  form.lastName.trim(),
      age:       parseInt(form.age) || 0,
      contact:   form.phone.trim(),
      type:      type || 'social',
      kilde:     kilde || 'andet',
      kildeDetalje: kildeDetalje || null,
      needs:     selectedBehov,
      health:    udfordringer.trim() || 'Ingen særlige forhold.',
      sroiMaalgruppe:    sroiMaalgruppe || 'uoplyst',
      helbredsKategorier,
      address:   '', meetPoint: '', language: 'Dansk',
      activeCount: 0, completedCount: 0, cancelledCount: 0,
      notes:     [],
      hq:        viewingHq || 'Aarhus',
      createdAt: new Date().toISOString().split('T')[0],
      brobygning: {
        dato: brobygDato, start: brobygStart,
        duration: brobygDuration, frekvens: brobygFrekvens,
        note: brobygNote, sted: brobygSted,
      },
    };
    const updated = { ...(window.SoS_MENNESKER || {}), [id]: newPerson };
    window.SoS_MENNESKER = updated;
    window.SoS_STORE.save('mennesker', updated);
    setDone(true);
  };

  const inputStyle = {
    width: '100%', padding: '12px 14px',
    fontFamily: SoS.sans, fontSize: 15, color: SoS.ink,
    background: '#fff', border: `1.5px solid ${SoS.lineSoft}`,
    borderRadius: SoS.r.md, outline: 'none',
    boxSizing: 'border-box',
  };

  if (done) {
    return (
      <div style={{
        position: 'fixed', inset: 0, background: SoS.cream,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        padding: 32, zIndex: 300,
      }}>
        <div style={{
          width: 72, height: 72, borderRadius: 36,
          background: SoS.sage, display: 'flex',
          alignItems: 'center', justifyContent: 'center', marginBottom: 24,
        }}>
          <Icon name="check" size={32} color="#fff" weight={2.5}/>
        </div>
        <div style={{ fontFamily: SoS.font, fontSize: 28, fontWeight: 500,
          color: SoS.ink, textAlign: 'center', letterSpacing: -0.3, marginBottom: 8 }}>
          {form.firstName} er registreret
        </div>
        <div style={{ fontFamily: SoS.sans, fontSize: 14, color: SoS.inkSoft,
          textAlign: 'center', lineHeight: 1.6, maxWidth: 280, marginBottom: 32 }}>
          Oplysningerne er gemt. Du kan nu starte et match, eller vende tilbage til oversigten.
        </div>
        <button onClick={onClose} style={{
          width: '100%', maxWidth: 280, padding: '15px 0',
          background: SoS.orange, color: '#fff', border: 'none',
          borderRadius: SoS.r.md, fontFamily: SoS.sans, fontSize: 15,
          fontWeight: 600, cursor: 'pointer', marginBottom: 12,
        }}>
          Start matching
        </button>
        <button onClick={onClose} style={{
          width: '100%', maxWidth: 280, padding: '13px 0',
          background: 'transparent', color: SoS.inkSoft,
          border: `1px solid ${SoS.lineSoft}`, borderRadius: SoS.r.md,
          fontFamily: SoS.sans, fontSize: 14, cursor: 'pointer',
        }}>
          Tilbage til oversigt
        </button>
      </div>
    );
  }

  return (
    <div style={{
      position: 'fixed', inset: 0, background: SoS.cream,
      display: 'flex', flexDirection: 'column', zIndex: 300,
    }}>
      {/* Header */}
      <div style={{
        background: '#fff', padding: '54px 20px 16px',
        borderBottom: `1px solid ${SoS.lineSoft}`, flexShrink: 0,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
          <button onClick={onClose} style={{
            width: 36, height: 36, borderRadius: 18, border: 'none',
            background: SoS.creamDeep, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <Icon name="close" size={16} color={SoS.ink}/>
          </button>
          <div style={{ fontFamily: SoS.font, fontSize: 20, fontWeight: 500,
            color: SoS.ink, letterSpacing: -0.2 }}>
            Registrer menneske
          </div>
          <button onClick={onClose} style={{
            marginLeft: 'auto', background: 'none', border: 'none',
            fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,
            color: SoS.inkSoft, cursor: 'pointer', padding: '6px 4px',
          }}>Annuller</button>
        </div>
        {/* Step bar */}
        <div style={{ display: 'flex', gap: 6 }}>
          {STEPS.map((s, i) => (
            <div key={s} style={{
              flex: i === step ? 2 : 1, height: 4, borderRadius: 2,
              background: i < step ? SoS.sage : i === step ? SoS.orange : SoS.lineSoft,
              transition: 'all 0.3s',
            }}/>
          ))}
        </div>
        <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkMuted,
          marginTop: 6, letterSpacing: 0.3 }}>
          Trin {step + 1} af {STEPS.length} — {STEPS[step]}
        </div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 20px 120px' }}>

        {/* ── STEP 0: Kilde ── */}
        {step === 0 && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500,
              color: SoS.ink, marginBottom: 6, letterSpacing: -0.2 }}>
              Hvordan kom personen i kontakt?
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
              marginBottom: 20, lineHeight: 1.5 }}>
              Vi bruger dette til at forstå hvilke kanaler der virker bedst.
            </div>
            {INTAKE_KILDER.map(k => {
              const sel = kilde === k.id;
              return (
                <div key={k.id} style={{ marginBottom: 8 }}>
                  {/* Hoved-knap */}
                  <button onClick={() => { setKilde(k.id); setKildeDetalje(null); }} style={{
                    display: 'flex', alignItems: 'center', gap: 14, width: '100%',
                    padding: '14px 16px', textAlign: 'left',
                    background: sel ? SoS.orange + '12' : '#fff',
                    border: `2px solid ${sel ? SoS.orange : SoS.lineSoft}`,
                    borderRadius: sel && k.sub ? `${SoS.r.md}px ${SoS.r.md}px 0 0` : SoS.r.md,
                    cursor: 'pointer',
                  }}>
                    <div style={{
                      width: 40, height: 40, borderRadius: 20, flexShrink: 0,
                      background: sel ? SoS.orange : SoS.creamDeep,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                    }}>
                      <Icon name={k.icon} size={18} color={sel ? '#fff' : SoS.inkSoft}/>
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: SoS.sans, fontSize: 14, fontWeight: 600,
                        color: SoS.ink }}>{k.label}</div>
                      <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft,
                        marginTop: 2 }}>
                        {sel && kildeDetalje
                          ? (k.sub || []).find(s => s.id === kildeDetalje)?.label
                          : k.desc}
                      </div>
                    </div>
                    {sel && kildeDetalje
                      ? <Icon name="check" size={16} color={SoS.orange}/>
                      : sel && k.sub
                        ? <Icon name="chevronD" size={14} color={SoS.orange}/>
                        : sel
                          ? <Icon name="check" size={16} color={SoS.orange}/>
                          : null}
                  </button>

                  {/* Underkategorier — vises kun når hoved er valgt og der er sub */}
                  {sel && k.sub && (
                    <div style={{
                      background: SoS.orange + '08',
                      border: `2px solid ${SoS.orange}`,
                      borderTop: 'none',
                      borderRadius: `0 0 ${SoS.r.md}px ${SoS.r.md}px`,
                      padding: '12px 14px 14px',
                    }}>
                      <div style={{ fontFamily: SoS.sans, fontSize: 10, fontWeight: 700,
                        color: SoS.orange, letterSpacing: 0.8, textTransform: 'uppercase',

                      </div>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>
                        {k.sub.map(s => {
                          const subSel = kildeDetalje === s.id;
                          return (
                            <button key={s.id} onClick={() => setKildeDetalje(subSel ? null : s.id)} style={{
                              padding: '7px 13px', borderRadius: 999, cursor: 'pointer',
                              fontFamily: SoS.sans, fontSize: 13, fontWeight: subSel ? 600 : 400,
                              background: subSel ? SoS.orange : '#fff',
                              color: subSel ? '#fff' : SoS.ink,
                              border: `1.5px solid ${subSel ? SoS.orange : SoS.lineSoft}`,
                            }}>{s.label}</button>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </>
        )}

        {/* ── STEP 1: Basisinfo ── */}
        {step === 1 && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500,
              color: SoS.ink, marginBottom: 6, letterSpacing: -0.2 }}>
              Basisoplysninger
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
              marginBottom: 20, lineHeight: 1.5 }}>
              Fornavn, alder og telefon er påkrævet. Øvrige oplysninger er frivillige.
            </div>
            {[
              { key: 'firstName', label: 'Fornavn',   placeholder: 'f.eks. Erik',  required: true },
              { key: 'lastName',  label: 'Efternavn', placeholder: 'Valgfrit' },
              { key: 'age',       label: 'Alder',     placeholder: 'f.eks. 72',    required: true, type: 'number' },
              { key: 'phone',     label: 'Telefon',   placeholder: 'f.eks. +45 28 34 56 78', required: true },
            ].map(field => (
              <div key={field.key} style={{ marginBottom: 14 }}>
                <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600,
                  color: SoS.ink, marginBottom: 6 }}>
                  {field.label}
                  {field.required && <span style={{ color: SoS.orange }}> *</span>}
                </div>
                <input
                  type={field.type || 'text'}
                  placeholder={field.placeholder}
                  value={form[field.key]}
                  onChange={e => setForm(f => ({ ...f, [field.key]: e.target.value }))}
                  style={{...inputStyle,
                    borderColor: field.key === 'phone' && form.phone.length > 0 && !phoneOk
                      ? '#E05252' : inputStyle.borderColor }}
                />
                {field.key === 'phone' && form.phone.length > 0 && !phoneOk && (
                  <div style={{ fontFamily: SoS.sans, fontSize: 11, color: '#E05252',
                    marginTop: 4 }}>Mobilnummer skal være præcis 8 cifre</div>
                )}
              </div>
            ))}
          </>
        )}

        {/* ── STEP 2: Behov ── */}
        {step === 2 && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500,
              color: SoS.ink, marginBottom: 6, letterSpacing: -0.2 }}>
              Behov og situation

              Vælg brobygningstype og beskriv de behov og udfordringer du kender til.

            <FieldLabel>Brobygningstype</FieldLabel>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 22 }}>
              {Object.values(SoS_TYPER).map(t => {
                const sel = type === t.id;
                return (
                  <button key={t.id} onClick={() => { setType(t.id); setSelectedBehov([]); }} style={{
                    display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px',
                    background: sel ? t.soft : '#fff',
                    border: `2px solid ${sel ? t.color : SoS.lineSoft}`,
                    borderRadius: SoS.r.md, cursor: 'pointer', textAlign: 'left',
                  }}>
                    <div style={{
                      width: 34, height: 34, borderRadius: 17, flexShrink: 0,
                      background: sel ? t.color : SoS.creamDeep,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                    }}>
                      <Icon name={t.icon} size={16} color={sel ? '#fff' : SoS.inkSoft}/>
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,
                        color: SoS.ink }}>{t.label}</div>
                      <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft,
                        marginTop: 2 }}>{t.desc}</div>
                    </div>
                    {sel && <Icon name="check" size={14} color={t.color}/>}
                  </button>
                );

            </div>

            {/* Specifikke behov */}
            <FieldLabel note={type ? 'vælg alle der passer' : 'vælg en type ovenfor først'}>Specifikke behov</FieldLabel>
            {!type && (
              <div style={{ padding: '14px 16px', background: SoS.creamDeep,
                borderRadius: SoS.r.sm, marginBottom: 22,
                fontFamily: SoS.sans, fontSize: 13, color: SoS.inkMuted }}>
                Vælg en brobygningstype ovenfor for at se relevante behov.
              </div>
            )}
            {type && <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 22 }}>
              {(INTAKE_BEHOV_BY_TYPE[type] || []).map(b => {
                const sel = selectedBehov.includes(b);
                return (
                  <button key={b} onClick={() => toggleBehov(b)} style={{
                    padding: '8px 14px',
                    fontFamily: SoS.sans, fontSize: 13,
                    fontWeight: sel ? 600 : 400,
                    color: sel ? SoS.orange : SoS.inkSoft,
                    background: sel ? SoS.orange + '15' : '#fff',
                    border: `1.5px solid ${sel ? SoS.orange : SoS.lineSoft}`,
                    borderRadius: 999, cursor: 'pointer',
                  }}>
                    {b}
                  </button>
                );
              })}
            </div>}

            {/* Sundhedsudfordring — intern klassifikation */}
            <div style={{
              background: SoS.creamDeep, borderRadius: SoS.r.md,

              <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 700,

                  }}>
                    <input
                      type="radio"
                      name="sroiMaalgruppe"
                      value={opt.id}
                      checked={sroiMaalgruppe === opt.id}
                      onChange={() => setSroiMaalgruppe(opt.id)}
                      style={{ accentColor: SoS.orange, width: 16, height: 16, flexShrink: 0 }}

                    <span style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.ink }}>

                    </span>

            </div>

              <div style={{
                background: '#FFF8F0', border: `1.5px solid ${SoS.orange}30`,
                borderRadius: SoS.r.md, padding: '12px 14px', marginBottom: 14,

                <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start', marginBottom: 10 }}>
                  <Icon name="shield" size={14} color={SoS.orange} style={{ marginTop: 1 }}/>
                  <div>
                    <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 700,
                      color: SoS.orange }}>
                      Relevante helbredsforhold — fagligt brug
                    </div>
                    <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft,
                      marginTop: 2, lineHeight: 1.4 }}>
                      Frivilligt. GDPR art. 9. Bruges kun af brobygger til at støtte relationen

                    </div>
                  </div>
                </div>

                {/* Kategori-flervalg */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 600,

                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                    {(window.HELBREDS_KATEGORIER || []).map(kat => {

                      return (
                        <button key={kat.id}
                          onClick={() => setHelbredsKategorier(prev =>
                            on ? prev.filter(k => k !== kat.id) : [...prev, kat.id]

                          style={{
                            padding: '5px 12px', borderRadius: 999,
                            border: `1.5px solid ${on ? SoS.orange : SoS.lineSoft}`,
                            background: on ? SoS.orange + '15' : '#fff',
                            fontFamily: SoS.sans, fontSize: 12,
                            color: on ? SoS.orangeDeep : SoS.ink,
                            fontWeight: on ? 600 : 400,
                            cursor: 'pointer',
                          }}>
                          {kat.label}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Fritekst */}
                <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 600,
                  color: SoS.inkSoft, marginBottom: 6, letterSpacing: 0.4,

                  style={{
                    width: '100%', padding: '10px 12px',
                    fontFamily: SoS.sans, fontSize: 14, color: SoS.ink,
                    background: '#fff',
                    border: `1.5px solid ${SoS.orange}40`,
                    borderRadius: SoS.r.sm, outline: 'none', resize: 'none',
                    boxSizing: 'border-box', lineHeight: 1.5,
                  }}
                />
              </div>
            )}

            {/* Faglig helbreds-sektion — kun hvis aktiveret i admin */}
            {(window.SoS_SETTINGS || {}).visHelbredsforhold !== false && (
              <div style={{
                background: '#FFF8F0', border: `1.5px solid ${SoS.orange}30`,
                borderRadius: SoS.r.md, padding: '12px 14px', marginBottom: 14,
              }}>
                <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start', marginBottom: 10 }}>
                  <Icon name="shield" size={14} color={SoS.orange} style={{ marginTop: 1 }}/>
                  <div>
                    <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 700,
                      color: SoS.orange }}>
                      Relevante helbredsforhold — fagligt brug
                    </div>
                    <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkSoft,
                      marginTop: 2, lineHeight: 1.4 }}>
                      Frivilligt. GDPR art. 9. Bruges kun af brobygger til at støtte relationen
                      — bruges udelukkende til at støtte relationen.
                    </div>
                  </div>
                </div>

                {/* Kategori-flervalg */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 600,
                    color: SoS.inkSoft, marginBottom: 6, letterSpacing: 0.4,
                    textTransform: 'uppercase' }}>Overordnet kategori</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                    {(window.HELBREDS_KATEGORIER || []).map(kat => {
                      const on = helbredsKategorier.includes(kat.id);
                      return (
                        <button key={kat.id}
                          onClick={() => setHelbredsKategorier(prev =>
                            on ? prev.filter(k => k !== kat.id) : [...prev, kat.id]
                          )}
                          style={{
                            padding: '5px 12px', borderRadius: 999,
                            border: `1.5px solid ${on ? SoS.orange : SoS.lineSoft}`,
                            background: on ? SoS.orange + '15' : '#fff',
                            fontFamily: SoS.sans, fontSize: 12,
                            color: on ? SoS.orangeDeep : SoS.ink,
                            fontWeight: on ? 600 : 400,
                            cursor: 'pointer',
                          }}>
                          {kat.label}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Fritekst */}
                <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 600,
                  color: SoS.inkSoft, marginBottom: 6, letterSpacing: 0.4,
                  textTransform: 'uppercase' }}>Faglige noter til brobygger</div>
                <textarea
                  placeholder="F.eks. let demens, angst, mobilitetsvanskeligheder, kronisk smerte..."
                  value={udfordringer}
                  onChange={e => setUdfordringer(e.target.value)}
                  rows={3}
                  style={{
                    width: '100%', padding: '10px 12px',
                    fontFamily: SoS.sans, fontSize: 14, color: SoS.ink,
                    background: '#fff',
                    border: `1.5px solid ${SoS.orange}40`,
                    borderRadius: SoS.r.sm, outline: 'none', resize: 'none',
                    boxSizing: 'border-box', lineHeight: 1.5,
                  }}
                />
              </div>
            )}

            {/* Kontekstnote */}
            <FieldLabel note="valgfrit">Kontekstnote</FieldLabel>
            <textarea
              placeholder="Anden relevant kontekst om personen eller situationen..."
              value={note}
              onChange={e => setNote(e.target.value)}
              rows={2}
              style={{ ...inputStyle, resize: 'none', lineHeight: 1.5 }}
            />
          </>
        )}

        {/* ── STEP 3: Brobygningsønske ── */}
        {step === 3 && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500,
              color: SoS.ink, marginBottom: 6, letterSpacing: -0.2 }}>
              Brobygningsønske
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
              marginBottom: 20, lineHeight: 1.5 }}>
              Hvornår og hvor ofte ønsker personen brobygning?
            </div>

            {/* Dato */}
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 8 }}>Dato</div>
              <input type="date" value={brobygDato} onChange={e => setBrobygDato(e.target.value)}
                style={{ ...inputStyle }}/>
            </div>

            {/* Starttidspunkt */}
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 8 }}>Starttidspunkt</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00'].map(s => (
                  <button key={s} onClick={() => setBrobygStart(s)} style={{
                    padding: '8px 12px', borderRadius: SoS.r.md, cursor: 'pointer',
                    background: brobygStart === s ? SoS.orange : '#fff',
                    color: brobygStart === s ? '#fff' : SoS.ink,
                    border: `1.5px solid ${brobygStart === s ? SoS.orange : SoS.lineSoft}`,
                    fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,
                  }}>{s}</button>
                ))}
              </div>
            </div>

            {/* Varighed */}
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 8 }}>Varighed</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {[{label:'30 min',v:30},{label:'1 time',v:60},{label:'1½ time',v:90},{label:'2 timer',v:120}].map(d => (
                  <button key={d.v} onClick={() => setBrobygDuration(d.v)} style={{
                    padding: '8px 14px', borderRadius: SoS.r.md, cursor: 'pointer', flex: 1, minWidth: 80,
                    background: brobygDuration === d.v ? SoS.orange : '#fff',
                    color: brobygDuration === d.v ? '#fff' : SoS.ink,
                    border: `1.5px solid ${brobygDuration === d.v ? SoS.orange : SoS.lineSoft}`,
                    fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,
                  }}>{d.label}</button>
                ))}
              </div>
            </div>

            {/* Frekvens */}
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 8 }}>
                Frekvens <span style={{ fontWeight: 400, color: SoS.inkMuted }}>(valgfrit)</span>
              </div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {['Éngangs','Ugentlig','Hver 2. uge','Månedlig'].map(f => (
                  <button key={f} onClick={() => setBrobygFrekvens(prev => prev === f ? null : f)} style={{
                    padding: '8px 14px', borderRadius: 999, cursor: 'pointer',
                    background: brobygFrekvens === f ? SoS.orange : '#fff',
                    color: brobygFrekvens === f ? '#fff' : SoS.ink,
                    border: `1.5px solid ${brobygFrekvens === f ? SoS.orange : SoS.lineSoft}`,
                    fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,
                  }}>{f}</button>
                ))}
              </div>
            </div>

            {/* Notat */}
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 8 }}>
                Notat <span style={{ fontWeight: 400, color: SoS.inkMuted }}>(valgfrit)</span>
              </div>
              <textarea
                value={brobygNote}
                onChange={e => setBrobygNote(e.target.value)}
                rows={2}
                placeholder="F.eks. foretrækker formiddage..."
                style={{ ...inputStyle, resize: 'none', lineHeight: 1.5 }}
              />
            </div>

            {/* Foretrukket mødested */}
            <div>
              <div style={{ fontFamily: SoS.sans, fontSize: 11, fontWeight: 700,
                color: SoS.inkSoft, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 8 }}>
                Foretrukket mødested <span style={{ fontWeight: 400, color: SoS.inkMuted }}>(valgfrit)</span>
              </div>
              <StedSoeg value={brobygSted} onChange={setBrobygSted} viewingHq={viewingHq}/>
            </div>
          </>
        )}

        {/* ── STEP 4: Samtykke + opsummering ── */}
        {step === 4 && (
          <>
            <div style={{ fontFamily: SoS.font, fontSize: 22, fontWeight: 500,
              color: SoS.ink, marginBottom: 6, letterSpacing: -0.2 }}>
              Bekræft og gem
            </div>
            <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft,
              marginBottom: 16, lineHeight: 1.5 }}>
              Gennemgå oplysningerne inden du gemmer.
            </div>

            {/* Summary card */}
            <div style={{
              background: '#fff', borderRadius: SoS.r.lg,
              border: `1px solid ${SoS.lineSoft}`, marginBottom: 16, overflow: 'hidden',
            }}>
              {/* Person header */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 12,
                padding: '14px 16px', borderBottom: `1px solid ${SoS.lineSoft}` }}>
                <div style={{
                  width: 48, height: 48, borderRadius: 24, background: SoS.orange,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                }}>
                  <span style={{ fontFamily: SoS.sans, fontSize: 16,
                    fontWeight: 700, color: '#fff' }}>
                    {(form.firstName[0] || '?').toUpperCase()}{(form.lastName[0] || '').toUpperCase()}
                  </span>
                </div>
                <div>
                  <div style={{ fontFamily: SoS.sans, fontSize: 16,
                    fontWeight: 600, color: SoS.ink }}>
                    {form.firstName} {form.lastName}
                  </div>
                  <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.inkSoft }}>
                    {form.age} år{form.phone ? ` · ${form.phone}` : ''}
                  </div>
                </div>
              </div>
              {/* Summary rows */}
              {[
                { label: 'Kilde', value: (() => {
                    const ko = INTAKE_KILDER.find(k => k.id === kilde);
                    if (!ko) return '—';
                    const sub = kildeDetalje ? (ko.sub || []).find(s => s.id === kildeDetalje) : null;
                    return sub ? `${ko.label} · ${sub.label}` : ko.label;
                  })() },
                { label: 'Type', value: SoS_TYPER[type]?.label },
                { label: 'Behov', value: selectedBehov.join(', ') || '—' },
                ...(udfordringer ? [{ label: 'Udfordringer', value: udfordringer, sensitive: true }] : []),
                ...(note ? [{ label: 'Note', value: note }] : []),
              ].map(row => (
                <div key={row.label} style={{
                  display: 'flex', gap: 10,
                  padding: '10px 16px',
                  borderBottom: `1px solid ${SoS.lineSoft}`,
                  background: row.sensitive ? '#FFF8F0' : 'transparent',
                }}>
                  <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 600,
                    color: row.sensitive ? SoS.orange : SoS.inkMuted,
                    minWidth: 100, paddingTop: 1 }}>
                    {row.label}
                    {row.sensitive && ' 🔒'}
                  </div>
                  <div style={{ fontFamily: SoS.sans, fontSize: 13, color: SoS.ink,
                    lineHeight: 1.5, flex: 1 }}>{row.value}</div>
                </div>
              ))}
              <div style={{ padding: '10px 16px' }}>
                <div style={{ fontFamily: SoS.sans, fontSize: 11, color: SoS.inkMuted }}>
                  Registreret af dig · {new Date().toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' })}
                </div>
              </div>
            </div>

            {/* GDPR consent — særligt vigtigt ved følsomme data */}
            {udfordringer && (
              <div style={{
                background: '#FFF8F0', border: `1.5px solid ${SoS.orange}40`,
                borderRadius: SoS.r.md, padding: '12px 14px', marginBottom: 12,
              }}>
                <div style={{ fontFamily: SoS.sans, fontSize: 12, fontWeight: 700,
                  color: SoS.orange, marginBottom: 4 }}>
                  OBS: Du har registreret følsomme helbredsoplysninger
                </div>
                <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft,
                  lineHeight: 1.5 }}>
                  GDPR art. 9 kræver eksplicit samtykke til behandling af helbredsoplysninger.
                  Sørg for at dette er dokumenteret — f.eks. via underskrevet samtykkeerklæring
                  eller journalnotat — inden du gemmer.
                </div>
              </div>
            )}

            <button
              onClick={() => setConsent(c => !c)}
              style={{
                display: 'flex', gap: 14, alignItems: 'flex-start', width: '100%',
                padding: '14px 16px',
                background: consent ? SoS.sage + '15' : '#fff',
                border: `2px solid ${consent ? SoS.sage : SoS.lineSoft}`,
                borderRadius: SoS.r.md, cursor: 'pointer', textAlign: 'left',
              }}>
              <div style={{
                width: 22, height: 22, borderRadius: 6, flexShrink: 0, marginTop: 1,
                background: consent ? SoS.sage : '#fff',
                border: `2px solid ${consent ? SoS.sage : SoS.lineSoft}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                {consent && <Icon name="check" size={12} color="#fff" weight={3}/>}
              </div>
              <div>
                <div style={{ fontFamily: SoS.sans, fontSize: 13, fontWeight: 600,
                  color: SoS.ink, marginBottom: 4 }}>
                  Samtykke er indhentet og dokumenteret
                </div>
                <div style={{ fontFamily: SoS.sans, fontSize: 12, color: SoS.inkSoft,
                  lineHeight: 1.5 }}>
                  Personen er informeret om formålet med registreringen, hvem der
                  har adgang til oplysningerne, og at de til enhver tid kan
                  trække samtykket tilbage.
                  {udfordringer && ' Særskilt samtykke til helbredsoplysninger er dokumenteret.'}
                </div>
              </div>
            </button>
          </>
        )}
      </div>

      {/* Footer */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0,
        padding: '12px 20px 34px',
        background: 'linear-gradient(to top, #fff 60%, transparent)',
        flexShrink: 0,
      }}>
        <div style={{ display: 'flex', gap: 10 }}>
          {step > 0 && (
            <button onClick={() => setStep(s => s - 1)} style={{
              flex: 1, padding: '14px 0',
              background: '#fff', color: SoS.ink,
              border: `1.5px solid ${SoS.lineSoft}`, borderRadius: SoS.r.md,
              fontFamily: SoS.sans, fontSize: 15, cursor: 'pointer',
            }}>
              Tilbage
            </button>
          )}
          {step < 4 ? (
            <button
              disabled={step === 0 ? !canNext0 : step === 1 ? !canNext1 : step === 2 ? !canNext2 : !canNext3}
              onClick={() => setStep(s => s + 1)}
              style={{
                flex: 2, padding: '14px 0',
                background: (step === 0 ? canNext0 : step === 1 ? canNext1 : step === 2 ? canNext2 : canNext3)
                  ? SoS.orange : SoS.lineSoft,
                color: (step === 0 ? canNext0 : step === 1 ? canNext1 : step === 2 ? canNext2 : canNext3)
                  ? '#fff' : SoS.inkMuted,
                border: 'none', borderRadius: SoS.r.md,
                fontFamily: SoS.sans, fontSize: 15, fontWeight: 600,
                cursor: 'pointer', transition: 'background 0.2s',
              }}>
              Næste
            </button>
          ) : (
            <button
              disabled={!canFinish}
              onClick={handleFinish}
              style={{
                flex: 2, padding: '14px 0',
                background: canFinish ? SoS.sage : SoS.lineSoft,
                color: canFinish ? '#fff' : SoS.inkMuted,
                border: 'none', borderRadius: SoS.r.md,
                fontFamily: SoS.sans, fontSize: 15, fontWeight: 600,
                cursor: 'pointer', transition: 'background 0.2s',
              }}>
              Gem og opret
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

window.IntakeFlow = IntakeFlow;
</script>

</body>
</html>
